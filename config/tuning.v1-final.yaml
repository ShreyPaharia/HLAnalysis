# v1 final sweep: tighten remaining knobs. drift_aware_d=False (proven worse).
# vol_max becomes a real cap (was disabled at 100); min_safety_d / exit_safety_d
# and tte_max sweep to find joint optimum.
# 3 * 3 * 2 * 3 = 54 cells * 3 splits.

v1_grid:
  tte_min_seconds: [0]
  tte_max_seconds: [3600, 5400, 7200]
  price_extreme_threshold: [0.90]
  price_extreme_max: [0.995]
  distance_from_strike_usd_min: [0]
  vol_max: [100, 0.0010, 0.0008]
  stop_loss_pct: [null]
  min_safety_d: [1.5, 1.8, 2.0]
  vol_lookback_seconds: [3600]
  exit_safety_d: [0.8, 1.0]
  exit_bid_floor: [0.0]
  drift_aware_d: [false]

v2_grid:
  vol_lookback_seconds: [14400]
  edge_buffer: [0.02]
  stop_loss_pct: [null]
  drift_lookback_seconds: [0]

run:
  train_markets: 60
  test_markets: 60
  step_markets: 60
  max_workers: 12
