deploy:
  env: dev                              # dev | staging | prod
  # Multi-account, venue-typed. Each `account_alias` referenced by an entry in
  # strategy.yaml must have a matching key here. The `venue:` discriminator
  # selects HyperliquidAccount | PolymarketAccount. Funding lives outside this
  # config (ops decision). To add an account: introduce env vars and add the
  # block below.
  accounts:
    v1:
      venue: hyperliquid
      account_address: ${HL_ACCOUNT_ADDRESS}
      api_secret_key: ${HL_API_SECRET_KEY}
      base_url: https://api.hyperliquid.xyz
    v31:
      venue: hyperliquid
      account_address: ${HL_ACCOUNT_ADDRESS_V31}
      api_secret_key: ${HL_API_SECRET_KEY_V31}
      base_url: https://api.hyperliquid.xyz
    # HYPE binary slot (2026-06-23). Distinct alias required by the strategies
    # loader's account_alias-uniqueness check, but it REUSES the v31 wallet/key
    # (same ${HL_ACCOUNT_ADDRESS_V31} / ${HL_API_SECRET_KEY_V31}) — one on-chain
    # account, two engine slots (BTC via `v31`, HYPE via `v31_hype`). The slots
    # have INDEPENDENT risk envelopes (the engine has no combined-pool cap) and
    # each runs its own reconcile against the shared wallet; BTC vs HYPE are
    # different coins so positions never collide. See docs/research/
    # 2026-06-22-v31-hl-hype-binary-tune.md (n=6 — first-week watch).
    v31_hype:
      venue: hyperliquid
      account_address: ${HL_ACCOUNT_ADDRESS_V31}
      api_secret_key: ${HL_API_SECRET_KEY_V31}
      base_url: https://api.hyperliquid.xyz
    # Polymarket CLOB slot for v3.1 strategy. Paper-only until Phase 8 of the
    # v3.1-PM plan wires py-clob-client-v2; live mode requires all four
    # `clob_api_*` creds plus the Polygon `private_key` for L1 signing.
    v31_pm:
      venue: polymarket
      clob_host: https://clob.polymarket.com
      chain_id: 137
      private_key: ${PM_PRIVATE_KEY}
      clob_api_key: ${PM_CLOB_API_KEY}
      clob_api_secret: ${PM_CLOB_API_SECRET}
      clob_api_passphrase: ${PM_CLOB_API_PASSPHRASE}
      # Required for polymarket.com-UI accounts (Safe-proxy maker). Set to
      # the address shown at polymarket.com/wallet ("Receive / Deposit").
      # Leave commented out for direct-EOA deployments.
      funder_address: ${PM_FUNDER_ADDRESS}
      signature_type: POLY_1271
    # Polymarket CLOB slot for v1 late_resolution. Separate funder/keys from
    # v31_pm so the two slots have independent PnL accounting and can be
    # halted independently. Walk-forward (2026-05-27) confirmed v1 stays
    # profitable under pm_binary fees at the existing config
    # (price_extreme_threshold=0.85, exit_safety_d=1.0): $556.65 / 5 OOS
    # splits, max DD $101, 464 trades — ~20% fee haircut vs flat fees.
    v1_pm:
      venue: polymarket
      clob_host: https://clob.polymarket.com
      chain_id: 137
      private_key: ${PM_PRIVATE_KEY_V1}
      clob_api_key: ${PM_CLOB_API_KEY_V1}
      clob_api_secret: ${PM_CLOB_API_SECRET_V1}
      clob_api_passphrase: ${PM_CLOB_API_PASSPHRASE_V1}
      funder_address: ${PM_FUNDER_ADDRESS_V1}
      signature_type: POLY_1271
    # PM multi-strike bucket slot (ETH). BTC multi-strike is NOT a separate
    # account — it's folded onto the existing v31_pm slot/wallet above (same
    # BTCUSDT_SPOT reference). Only ETH needs its own account because it uses a
    # different reference feed (ETHUSDT_SPOT) → must be a separate slot. paper_mode
    # transacts nothing, so these reference NEW env placeholders; provision a
    # dedicated funded PM wallet + SSM secrets at the ETH live flip. The distinct
    # alias gives it its own state.db / cloid prefix / kill switch.
    v31_pm_eth_ms:
      venue: polymarket
      clob_host: https://clob.polymarket.com
      chain_id: 137
      private_key: ${PM_PRIVATE_KEY_ETH_MS}
      clob_api_key: ${PM_CLOB_API_KEY_ETH_MS}
      clob_api_secret: ${PM_CLOB_API_SECRET_ETH_MS}
      clob_api_passphrase: ${PM_CLOB_API_PASSPHRASE_ETH_MS}
      funder_address: ${PM_FUNDER_ADDRESS_ETH_MS}
      signature_type: POLY_1271
  alerts:
    telegram:
      bot_token: ${TG_BOT_TOKEN}
      chat_id: ${TG_CHAT_ID}
  # When >1 accounts is configured, the engine namespaces state.db and the
  # kill switch under the alias: data/engine/<alias>/state.db ,
  # data/engine/<alias>/halt. For a single 'default' (or single-named) account
  # the legacy flat paths below are used to preserve existing deployments.
  state_db_path: data/engine/state.db
  kill_switch_path: data/engine/halt
