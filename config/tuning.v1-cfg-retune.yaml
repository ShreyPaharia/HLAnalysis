# v1 pure config retune: joint sweep of vol_max, min_safety_d, exit_safety_d, tte_max_seconds.
# Motivation: 9 catastrophic losers had median σ_1h=8.70bps vs 6.94bps for winners — a real
# vol_max cap (currently disabled at 100) might filter dangerous setups while preserving edge.
# Also retune min_safety_d / exit_safety_d jointly with the new tighter vol_max.
# Grid: 3 tte * 1 thr * 1 cap * 3 min_safety * 4 vol_max * 3 exit_safety = 108 cells * 3 splits = 324 jobs.

v1_grid:
  tte_min_seconds: [0]
  tte_max_seconds: [3600, 5400, 7200]
  price_extreme_threshold: [0.90]
  price_extreme_max: [0.995]
  distance_from_strike_usd_min: [0]
  vol_max: [100, 0.0012, 0.0010, 0.0008]
  stop_loss_pct: [null]
  min_safety_d: [1.5, 1.8, 2.0]
  vol_lookback_seconds: [3600]
  exit_safety_d: [0.8, 1.0, 1.2]
  exit_bid_floor: [0.0]
  drift_aware_d: [false]
  vol_ewma_lambda: [0.0]

v2_grid:
  vol_lookback_seconds: [14400]
  edge_buffer: [0.02]
  stop_loss_pct: [null]
  drift_lookback_seconds: [0]

run:
  train_markets: 60
  test_markets: 60
  step_markets: 60
  max_workers: 12
