subscriptions:
  # Hyperliquid BTC perp
  - venue: hyperliquid
    product_type: perp
    mechanism: clob
    symbol: BTC
    channels: [trades, book, bbo, mark, funding, oracle]

  # Hyperliquid ETH / SOL / HYPE perps — reference (mark/oracle settle the
  # HIP-4 binaries below) + future hedge legs. Same full channel set as BTC.
  # HYPE is not listed on Binance, so its HL perp is the only reference source.
  - venue: hyperliquid
    product_type: perp
    mechanism: clob
    symbol: ETH
    channels: [trades, book, bbo, mark, funding, oracle]

  - venue: hyperliquid
    product_type: perp
    mechanism: clob
    symbol: SOL
    channels: [trades, book, bbo, mark, funding, oracle]

  - venue: hyperliquid
    product_type: perp
    mechanism: clob
    symbol: HYPE
    channels: [trades, book, bbo, mark, funding, oracle]

  # ── HIP-4 BTC binary ────────────────────────────────────────────────
  - venue: hyperliquid
    product_type: prediction_binary
    mechanism: clob
    symbol: "*"
    channels: [trades, book, bbo]
    match:
      underlying: BTC
      class: priceBinary

  # ── HIP-4 BTC priceBucket (3-way + fallback) ────────────────────────
  # Same product_type, same wildcard, only `match` differs.
  - venue: hyperliquid
    product_type: prediction_binary
    mechanism: clob
    symbol: "*"
    channels: [trades, book, bbo]
    match:
      underlying: BTC
      class: priceBucket

  # ── HIP-4 ETH / SOL / HYPE outcome markets ──────────────────────────
  # Same wildcard auto-discovery as BTC; only `match` differs. Each coin
  # gets a priceBinary (above/below) and a priceBucket (range) filter.
  # As of 2026-06-16 only the binaries are live for these three — the
  # priceBucket filters are pre-armed so we auto-capture buckets the day
  # HL launches them (HL L2 is not backfillable). These are recorder-side
  # only: engine slot allowlists are unchanged, so nothing trades them.
  - venue: hyperliquid
    product_type: prediction_binary
    mechanism: clob
    symbol: "*"
    channels: [trades, book, bbo]
    match:
      underlying: ETH
      class: priceBinary

  - venue: hyperliquid
    product_type: prediction_binary
    mechanism: clob
    symbol: "*"
    channels: [trades, book, bbo]
    match:
      underlying: ETH
      class: priceBucket

  - venue: hyperliquid
    product_type: prediction_binary
    mechanism: clob
    symbol: "*"
    channels: [trades, book, bbo]
    match:
      underlying: SOL
      class: priceBinary

  - venue: hyperliquid
    product_type: prediction_binary
    mechanism: clob
    symbol: "*"
    channels: [trades, book, bbo]
    match:
      underlying: SOL
      class: priceBucket

  - venue: hyperliquid
    product_type: prediction_binary
    mechanism: clob
    symbol: "*"
    channels: [trades, book, bbo]
    match:
      underlying: HYPE
      class: priceBinary

  - venue: hyperliquid
    product_type: prediction_binary
    mechanism: clob
    symbol: "*"
    channels: [trades, book, bbo]
    match:
      underlying: HYPE
      class: priceBucket

  # Hyperliquid spot BTC (UBTC/USDC, "@142" in spotMeta, displayed as BTC/USDC in UI).
  # Same-venue depth/liquidity reference for the HIP-4 strategy depth guard.
  - venue: hyperliquid
    product_type: spot
    mechanism: clob
    symbol: "@142"
    channels: [trades, book, bbo, mark]

  # Binance BTC perp removed 2026-06-05: the live engine references Binance
  # SPOT only (reference_symbol: BTCUSDT_SPOT, perp feed removed 2026-06-01),
  # so the perp streams had no consumer (~48% of the recorded corpus). The
  # L2 microstructure (bbo/book) is the only irreplaceable part and is exactly
  # what nothing reads; funding/mark are backfillable from Binance public REST
  # history (/fapi/v1/fundingRate, premiumIndex) if hedge research ever needs
  # them. Re-add this block when the Binance hedge venue goes live.

  # Binance BTC spot (reference price)
  - venue: binance
    product_type: spot
    mechanism: clob
    symbol: BTCUSDT
    channels: [trades, book, bbo]

  # ── Polymarket subscriptions ────────────────────────────────────────
  # Adapter discovers active markets via Gamma per series_slug, then
  # subscribes their CLOB token IDs to the websocket. Symbol="*" is a
  # wildcard signal — actual market discovery is series-driven.
  #
  # `match:` keys ride along as QuestionMetaEvent metadata; downstream
  # engine slots filter by `class + underlying + series_slug` via their
  # strategy allowlist, so adding subscriptions here is recorder-side
  # data ingestion only — it does NOT cause existing engine slots to
  # trade new markets (allowlists guard that).

  # Crypto Up/Down daily — single-market priceBinary events.
  - venue: polymarket
    product_type: prediction_binary
    mechanism: clob
    symbol: "*"
    channels: [trades, book]
    match:
      underlying: BTC
      class: priceBinary
      series_slug: btc-up-or-down-daily
  - venue: polymarket
    product_type: prediction_binary
    mechanism: clob
    symbol: "*"
    channels: [trades, book]
    match:
      underlying: ETH
      class: priceBinary
      series_slug: eth-up-or-down-daily
  - venue: polymarket
    product_type: prediction_binary
    mechanism: clob
    symbol: "*"
    channels: [trades, book]
    match:
      underlying: XRP
      class: priceBinary
      series_slug: xrp-up-or-down-daily
  - venue: polymarket
    product_type: prediction_binary
    mechanism: clob
    symbol: "*"
    channels: [trades, book]
    match:
      underlying: HYPE
      class: priceBinary
      series_slug: hype-up-or-down-daily

  # ── Crypto weekly multi-strike "above ___" (digital, settle-at-close) ──
  # Same noon-ET Binance 1m-close resolution as up/down dailies, but a
  # strike LADDER (~11-16 legs/event, weekly settlement). The adapter now
  # groups each multi-strike event into one priceBucket question so the v31
  # theta_harvester bucket path runs verbatim (adapter: live enablement
  # 2026-06-08). NOTE: high leg-count + heavy book traffic on a t4g.micro —
  # BTC/ETH enabled; watch recorder RSS before enabling SOL/XRP below.
  - venue: polymarket
    product_type: prediction_binary
    mechanism: clob
    symbol: "*"
    channels: [trades, book]
    match:
      underlying: BTC
      class: priceBucket
      series_slug: btc-multi-strikes-weekly
  - venue: polymarket
    product_type: prediction_binary
    mechanism: clob
    symbol: "*"
    channels: [trades, book]
    match:
      underlying: ETH
      class: priceBucket
      series_slug: ethereum-multi-strikes-weekly
  # SOL/XRP multi-strikes — 10-30x smaller volume; enabled per operator
  # request. Watch recorder RSS on the t4g.micro (OOM risk with the added
  # leg-count + book traffic).
  - venue: polymarket
    product_type: prediction_binary
    mechanism: clob
    symbol: "*"
    channels: [trades, book]
    match:
      underlying: SOL
      class: priceBinary
      series_slug: solana-multi-strikes-weekly
  - venue: polymarket
    product_type: prediction_binary
    mechanism: clob
    symbol: "*"
    channels: [trades, book]
    match:
      underlying: XRP
      class: priceBinary
      series_slug: xrp-multi-strikes-weekly

  # ── Crypto daily hit-price (one-touch BARRIER, intraday High/Low) ─────
  # Resolves YES the moment any Binance 1m candle High reaches ("reach $X")
  # or Low dips to ("dip to $X") the level, anytime in the 24h ET window.
  # Different instrument from the digitals above — needs a barrier pricer,
  # NOT the N(d) model. Recording now purely to bank non-backfillable L2;
  # no engine strategy trades these yet.
  - venue: polymarket
    product_type: prediction_binary
    mechanism: clob
    symbol: "*"
    channels: [trades, book]
    match:
      underlying: BTC
      class: priceBinary
      series_slug: bitcoin-hit-price-daily
  - venue: polymarket
    product_type: prediction_binary
    mechanism: clob
    symbol: "*"
    channels: [trades, book]
    match:
      underlying: ETH
      class: priceBinary
      series_slug: ethereum-hit-price-daily
  # SOL/XRP hit-price daily — enabled alongside SOL/XRP multi-strikes per
  # operator request.
  - venue: polymarket
    product_type: prediction_binary
    mechanism: clob
    symbol: "*"
    channels: [trades, book]
    match:
      underlying: SOL
      class: priceBinary
      series_slug: solana-hit-price-daily
  - venue: polymarket
    product_type: prediction_binary
    mechanism: clob
    symbol: "*"
    channels: [trades, book]
    match:
      underlying: XRP
      class: priceBinary
      series_slug: xrp-hit-price-daily

  # Commodity hit/settle multi-strike (monthly cadence — kept per operator
  # request as the only non-crypto/non-sports asset class in the recorder).
  - venue: polymarket
    product_type: prediction_binary
    mechanism: clob
    symbol: "*"
    channels: [trades, book]
    match:
      underlying: GOLD
      class: priceBinary
      series_slug: what-will-gold-gc-hit
  - venue: polymarket
    product_type: prediction_binary
    mechanism: clob
    symbol: "*"
    channels: [trades, book]
    match:
      underlying: GOLD
      class: priceBinary
      series_slug: what-will-gold-gc-settle-at
  - venue: polymarket
    product_type: prediction_binary
    mechanism: clob
    symbol: "*"
    channels: [trades, book]
    match:
      underlying: OIL
      class: priceBinary
      series_slug: crude-oil-cl-hit
  - venue: polymarket
    product_type: prediction_binary
    mechanism: clob
    symbol: "*"
    channels: [trades, book]
    match:
      underlying: OIL
      class: priceBinary
      series_slug: crude-oil-cl-settle

  # NBA per-game multi-market events. Each game event has ~39 sub-markets
  # (moneyline, spreads, totals, props). The widened iter_binary_markets
  # yields all of them; the recorder captures L2 on every leg. Engine
  # slots ignore NBA via allowlist (no NBA strategy registered).
  - venue: polymarket
    product_type: prediction_binary
    mechanism: clob
    symbol: "*"
    channels: [trades, book]
    match:
      underlying: NBA
      class: priceBinary
      series_slug: nba-2026
