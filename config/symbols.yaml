subscriptions:
  # Hyperliquid BTC perp
  - venue: hyperliquid
    product_type: perp
    mechanism: clob
    symbol: BTC
    channels: [trades, book, bbo, mark, funding, oracle]

  # HIP-4 outcome markets — symbol "*" auto-discovers all currently active markets
  # via outcomeMeta (refreshed every 60s). When a market expires and a new one opens
  # with a different encoding, the adapter automatically subscribes and emits
  # outcome-discovered / outcome-rolled health events at the boundary.
  # `mark` dropped: outcome coins have no activeAssetCtx → that subscription was a no-op.
  - venue: hyperliquid
    product_type: prediction_binary
    mechanism: clob
    symbol: "*"
    channels: [trades, book, bbo]

  # Hyperliquid spot BTC (UBTC/USDC, "@142" in spotMeta, displayed as BTC/USDC in UI).
  # Same-venue depth/liquidity reference for the HIP-4 strategy depth guard.
  - venue: hyperliquid
    product_type: spot
    mechanism: clob
    symbol: "@142"
    channels: [trades, book, bbo, mark]

  # Binance USDT-margined BTC perp (reference + hedge venue).
  - venue: binance
    product_type: perp
    mechanism: clob
    symbol: BTCUSDT
    channels: [trades, book, bbo, mark, funding]

  # Binance BTC spot (reference price)
  - venue: binance
    product_type: spot
    mechanism: clob
    symbol: BTCUSDT
    channels: [trades, book, bbo]
