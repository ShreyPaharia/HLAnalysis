subscriptions:
  # Hyperliquid BTC perp
  - venue: hyperliquid
    product_type: perp
    mechanism: clob
    symbol: BTC
    channels: [trades, book, bbo, mark, funding, oracle]

  # ── HIP-4 BTC binary ────────────────────────────────────────────────
  - venue: hyperliquid
    product_type: prediction_binary
    mechanism: clob
    symbol: "*"
    channels: [trades, book, bbo]
    match:
      underlying: BTC
      class: priceBinary

  # ── HIP-4 BTC priceBucket (3-way + fallback) ────────────────────────
  # Same product_type, same wildcard, only `match` differs.
  - venue: hyperliquid
    product_type: prediction_binary
    mechanism: clob
    symbol: "*"
    channels: [trades, book, bbo]
    match:
      underlying: BTC
      class: priceBucket

  # Hyperliquid spot BTC (UBTC/USDC, "@142" in spotMeta, displayed as BTC/USDC in UI).
  # Same-venue depth/liquidity reference for the HIP-4 strategy depth guard.
  - venue: hyperliquid
    product_type: spot
    mechanism: clob
    symbol: "@142"
    channels: [trades, book, bbo, mark]

  # Binance USDT-margined BTC perp (reference + hedge venue).
  - venue: binance
    product_type: perp
    mechanism: clob
    symbol: BTCUSDT
    channels: [trades, book, bbo, mark, funding]

  # Binance BTC spot (reference price)
  - venue: binance
    product_type: spot
    mechanism: clob
    symbol: BTCUSDT
    channels: [trades, book, bbo]

  # ── Polymarket subscriptions ────────────────────────────────────────
  # Adapter discovers active markets via Gamma per series_slug, then
  # subscribes their CLOB token IDs to the websocket. Symbol="*" is a
  # wildcard signal — actual market discovery is series-driven.
  #
  # `match:` keys ride along as QuestionMetaEvent metadata; downstream
  # engine slots filter by `class + underlying + series_slug` via their
  # strategy allowlist, so adding subscriptions here is recorder-side
  # data ingestion only — it does NOT cause existing engine slots to
  # trade new markets (allowlists guard that).

  # Crypto Up/Down daily — single-market priceBinary events.
  - venue: polymarket
    product_type: prediction_binary
    mechanism: clob
    symbol: "*"
    channels: [trades, book]
    match:
      underlying: BTC
      class: priceBinary
      series_slug: btc-up-or-down-daily
  - venue: polymarket
    product_type: prediction_binary
    mechanism: clob
    symbol: "*"
    channels: [trades, book]
    match:
      underlying: ETH
      class: priceBinary
      series_slug: eth-up-or-down-daily
  - venue: polymarket
    product_type: prediction_binary
    mechanism: clob
    symbol: "*"
    channels: [trades, book]
    match:
      underlying: XRP
      class: priceBinary
      series_slug: xrp-up-or-down-daily
  - venue: polymarket
    product_type: prediction_binary
    mechanism: clob
    symbol: "*"
    channels: [trades, book]
    match:
      underlying: HYPE
      class: priceBinary
      series_slug: hype-up-or-down-daily

  # Equity hit-price multi-strike (monthly cadence — 14-22 strikes/event,
  # each a standalone 2-outcome priceBinary "Will TICKER hit $X this month?").
  # Top equity tickers by PM volume as of 2026-05-27.
  - venue: polymarket
    product_type: prediction_binary
    mechanism: clob
    symbol: "*"
    channels: [trades, book]
    match:
      underlying: NVDA
      class: priceBinary
      series_slug: nvidia-hit-price-monthly
  - venue: polymarket
    product_type: prediction_binary
    mechanism: clob
    symbol: "*"
    channels: [trades, book]
    match:
      underlying: TSLA
      class: priceBinary
      series_slug: tesla-hit-price-monthly
  - venue: polymarket
    product_type: prediction_binary
    mechanism: clob
    symbol: "*"
    channels: [trades, book]
    match:
      underlying: AAPL
      class: priceBinary
      series_slug: apple-hit-price-monthly
  - venue: polymarket
    product_type: prediction_binary
    mechanism: clob
    symbol: "*"
    channels: [trades, book]
    match:
      underlying: GOOG
      class: priceBinary
      series_slug: google-hit-price-monthly
  - venue: polymarket
    product_type: prediction_binary
    mechanism: clob
    symbol: "*"
    channels: [trades, book]
    match:
      underlying: MSFT
      class: priceBinary
      series_slug: microsoft-hit-price-monthly
  - venue: polymarket
    product_type: prediction_binary
    mechanism: clob
    symbol: "*"
    channels: [trades, book]
    match:
      underlying: AMZN
      class: priceBinary
      series_slug: amazon-hit-price-monthly
  - venue: polymarket
    product_type: prediction_binary
    mechanism: clob
    symbol: "*"
    channels: [trades, book]
    match:
      underlying: META
      class: priceBinary
