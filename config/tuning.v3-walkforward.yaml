# v3 theta harvester walk-forward.
# v2 entry params held fixed at v2-diag-2026-05-10 config; only sweep v3 exit knobs.
# Grid: 5 * 4 * 4 * 3 = 240 cells * 5 splits = 1200 jobs at 12 workers (~hours).

grids:
  v3_theta_harvester:
    vol_lookback_seconds: [3600]
    vol_sampling_dt_seconds: [60]
    edge_buffer: [0.02]
    fee_taker: [0.0]
    half_spread_assumption: [0.005]
    stop_loss_pct: [null, 0.30, 0.50]
    drift_lookback_seconds: [14400]
    favorite_threshold: [0.7]
    tte_min_seconds: [0]
    tte_max_seconds: [43200]
    max_position_usd: [100.0]
    exit_edge_threshold: [0.0, -0.005, -0.01, -0.02, -0.05]
    take_profit_price: [null, 0.05, 0.10, 0.20]
    time_stop_seconds: [0, 600, 1800, 3600]

run:
  train_markets: 60
  test_markets: 60
  step_markets: 60
  max_workers: 12
