        size_cap_max_dist_pct: 1.5
        size_cap_min_ask: 0.88
        # PM has tight spreads, so the bid-vs-ask entry signal is a no-op.
        # Keep the gate on ask (HL-only switch).
        use_bid_for_entry_gate: false
        # Safety gate per [[feedback-keep-safety-gates]] — kept even though
        # PM bid notionals are typically thousands of dollars.
        min_bid_notional_usd: 10.0
        entry_cooldown_seconds: 60
        # Fee declaration. Strategy gates don't read these (v1 has no edge
        # formula), but the live config carries an explicit declaration of the
