    # 2026-06-01: σ/OHLC from dense Binance SPOT BBO (see v31_pm note). Lockstep with
    # v31_pm on the shared BTCUSDT_SPOT feed at dt=5. v1_pm uses the validated dt=5 config
    # (parkinson / min_safety_d 3.0 / λ 0.97 — backtest $358 vs dt=60 $326). The bbo
    # OHLC feeds the H/L bars Parkinson needs (engine recent_hl_bars).
    reference_sigma_source: bbo

    allowlist:
      - match:
          class: priceBinary
          underlying: BTC
          venue: polymarket                 # scope to PM; HL BTC binaries share class+underlying
