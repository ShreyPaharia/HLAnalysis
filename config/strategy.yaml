        vol_lookback_seconds: 3600
        exit_safety_d: 1.0                  # +$140 PnL / cuts DD from $228 to $101 vs disabled
        vol_ewma_lambda: 0.97               # dt=5 retune (was 0.85) — 0.85 is jumpy on 5s bars
        vol_estimator: parkinson            # range-based; robust to 5s bid-ask bounce (needs H/L, now fed via bbo OHLC)
        vol_sampling_dt_seconds: 5          # LOCKSTEP with v31_pm on shared BTCUSDT_SPOT bbo feed
        distance_from_strike_usd_min: 0
