# Multi-strategy live config.
#
# Each entry under `strategies:` is one (strategy, account) pair that the engine
# runs concurrently — shared MarketState/WS, isolated state DB, risk gate,
# router, reconciler, cloid prefix. See DEPLOYMENT.md "Multi-account topology"
# for the wiring rationale and the deploy.yaml twin (`hl_accounts:`).
#
# To add a strategy: append another entry with a distinct `account_alias`
# (must also exist under `deploy.hl_accounts` in deploy.yaml).
# To roll back to a single strategy: keep only the first entry; engine still
# loads it correctly.

strategies:
  - name: late_resolution
    account_alias: v1                   # → deploy.hl_accounts.v1
    strategy_type: late_resolution
    paper_mode: false                   # LIVE: real HL orders

    # Pattern-based allowlist; matches QuestionMetaEvent fields.
    # Auto-applies across rollovers; blocklist for per-instance escape hatch.
    allowlist:
      # 24h regime: enter inside the last 2h, winning leg ∈ [0.85, 0.999]. Lower
      # bound calibrated on PM BTC daily Up/Down (May 2025 – May 2026): walk-forward
      # 5-OOS-split total $577, full-year $687, Sharpe 3.70, hit 74.9%. Upper bound
      # widened from PM-optimal 0.97 because HL HIP-4 favorites trade tighter
      # (0.98–0.9999); the 0.97 cap blocked every HL trade in live. HL-specific
      # tuning is a follow-up once enough live fills accumulate.
      - match:
          class: priceBinary
          underlying: BTC
          venue: hyperliquid              # scope to HL; PM BTC binaries share class+underlying
        max_position_usd: 300             # bumped 200→300 2026-05-24
        stop_loss_pct: null              # disabled — 1y PM tuning showed any stop hurts net PnL
        tte_min_seconds: 0
        tte_max_seconds: 7200
        price_extreme_threshold: 0.85
        # 2026-05-19 edge-and-tuning memo P2: tighten upper bound from 0.999 → 0.99.
        # The 0.001 band contributes zero PnL after the [0,1] fill clamp but is
        # exactly where stale-high asks live. HL backtest unchanged (no entries
        # in [0.99, 0.999] in 13-day corpus); strictly defensive.
        price_extreme_max: 0.99
        min_safety_d: 3.0
        vol_lookback_seconds: 3600
        exit_safety_d: 1.0
        vol_ewma_lambda: 0.97
        # 2026-05-30 v1 cadence validation. Parkinson (range/HL) σ is the robust
        # +$48 lever; paired with dt=5 sub-minute sampling + the gate retune
        # (min_safety_d 1.0→3.0, λ 0.85→0.97) the dt=5 winner is $269.52 / Sharpe
        # 9.73 / DD $33 vs the dt=60 baseline $212. v1 + v31 share the BTC feed
        # and MUST move to dt=5 IN LOCKSTEP (engine conflict-guards a mismatch).
        # ⚠️ GATE: requires ≥1-week paper validation before live cutover.
        # See docs/research/v1_cadence_validation_2026_05_30.md.
        vol_estimator: parkinson
        vol_sampling_dt_seconds: 5
        distance_from_strike_usd_min: 0
        vol_max: 100
        # Targeted near-strike low-ask size cap — zero size on the 4 catastrophic
        # leg-flip trades the 1y PM analysis surfaced (BTC within 1.5% of strike,
        # ask ∈ [0.85, 0.88]). Walk-forward 5-OOS-split total $585 → $679
        # (+$94, +16%), max drawdown $122 → $90 (−26%), Sharpe 3.88 → 6.22
        # at fixed trade count (−12 trades, all losers). See
        # data/sim/tuning/v1-size-cap-pm/.
        size_cap_near_strike_pct: 1.0
        size_cap_max_dist_pct: 1.5
        size_cap_min_ask: 0.88
        # 2026-05-19 churn fixes — see fixes commit. HL HIP-4 books have
        # stale top-of-book asks that drove v1 to enter at 0.999 ask and
        # fill at 0.55-0.60. The bid is structurally a more reliable signal
        # because stale-high-bids get arbed in ms while stale-high-asks
        # persist. Sizing and IOC limit still use ask; only the gate moves.
        use_bid_for_entry_gate: true
        # 2026-05-19 edge-and-tuning memo P1: raise from 10 → 25.
        # HL microstructure profile (3.83M ticks, §3 of memo): only 1.4% of v1
        # entry-gate ticks have bid notional <$10; $25 catches ~18% of thin-book
        # ticks. PM bid notionals are routinely $thousands → no PM impact.
        min_bid_notional_usd: 25.0
        # 60s cooldown after exit on the same question_idx — would have
        # prevented every churn cycle observed today regardless of which
        # other gate was misfiring.
        entry_cooldown_seconds: 60
      # priceBucket — same per-leg consensus rule across all bucket legs.
      # NOTE: Polymarket bucket data uses an "above-X binary stack" layout that
      # is incompatible with the strategy's HL mutually-exclusive bucket
      # interpretation (see docs/v1-bucket-sizing-results.md), so the PM corpus
      # cannot be used to tune these params. This entry stays calibrated to the
      # binary params and applies only to HL HIP-4 priceBucket markets (which
      # match the strategy's expected layout). size_cap defaults to disabled
      # here pending HL-bucket-specific tuning.
      - match:
          class: priceBucket
          underlying: BTC
          venue: hyperliquid              # scope to HL
        max_position_usd: 300             # bumped 200→300 2026-05-24
        stop_loss_pct: null              # disabled — 1y PM tuning showed any stop hurts net PnL
        tte_min_seconds: 0
        # 2026-05-22: capped at 6h for live forward-test. Backtest swept
        # tte∈{2,4,12,24}h post-σ-fix; 24h optimum was selected by total PnL
        # but live operations want a tighter exposure window than backtest
        # suggested while we confirm the per-class plumbing change actually
        # fires. 6h sits between the 4h and 12h backtest points (+$49.49
        # and +$122.84 / DD $0 respectively); revisit once we have ≥1 week
        # of live priceBucket fills.
        tte_max_seconds: 21600
        price_extreme_threshold: 0.85
        price_extreme_max: 0.999          # HL HIP-4 favorites trade 0.98-0.9999; 0.97 cap blocked every trade live
        min_safety_d: 3.0                 # dt=5 retune; see priceBinary slot
        vol_lookback_seconds: 3600
        exit_safety_d: 0.0                # mid-hold disabled on buckets per retune
        vol_ewma_lambda: 0.97             # dt=5 retune; see priceBinary slot
        vol_estimator: parkinson          # see priceBinary slot — 2026-05-30 cadence validation
        vol_sampling_dt_seconds: 5        # LOCKSTEP with v31 on shared BTC feed; ⚠️ paper-validate first
        distance_from_strike_usd_min: 0
        vol_max: 100
        # See priceBinary entry above for rationale on these three.
        use_bid_for_entry_gate: true
        min_bid_notional_usd: 25.0
        entry_cooldown_seconds: 60
      # Add more class entries as new question classes are approved for trading

    blocklist_question_idxs: []         # explicit per-instance exclusions

    defaults:
      match: {}
      max_position_usd: 300               # mirrors allowlist; build_late_resolution_config reads from here
      stop_loss_pct: null
      tte_min_seconds: 0
      tte_max_seconds: 7200
      price_extreme_threshold: 0.85
      price_extreme_max: 0.999
      min_safety_d: 3.0                    # dt=5 retune; see priceBinary slot
      vol_lookback_seconds: 3600
      exit_safety_d: 1.0
      vol_ewma_lambda: 0.97                # dt=5 retune; see priceBinary slot
      vol_estimator: parkinson            # see priceBinary slot — 2026-05-30 cadence validation
      vol_sampling_dt_seconds: 5          # LOCKSTEP with v31 on shared BTC feed; ⚠️ paper-validate first
      distance_from_strike_usd_min: 0
      vol_max: 100
      # See per-allowlist entries above; engine `build_late_resolution_config`
      # reads from defaults here, so the strategy instance always sees this cap.
      size_cap_near_strike_pct: 1.0
      size_cap_max_dist_pct: 1.5
      size_cap_min_ask: 0.88
      use_bid_for_entry_gate: true        # 2026-05-19 churn fix; see allowlist comment
      min_bid_notional_usd: 10.0
      entry_cooldown_seconds: 60          # router uses this for the post-exit veto
      # Position topup (2026-05-20): when an IOC partial-fill leaves the held
      # position under target by ≥ 20%, re-run entry gates against the current
      # book and emit a second ENTER for the shortfall. Exit-eval always wins.
      topup_enabled: true
      topup_threshold_pct: 0.2
      topup_min_notional_usd: 11.0        # HL per-order min is $10; buffer to 11

    global:
      max_total_inventory_usd: 1000
      max_concurrent_positions: 5
      daily_loss_cap_usd: 100             # tightened from 200 in lockstep with per-position cap
      max_strike_distance_pct: 50       # 50% — BTC moves 5-10% per day, allow room
      min_recent_volume_usd: 100        # HL HIP-4 binaries are inherently thin; 1000 vetoed every trade
      stale_data_halt_seconds: 30       # HIP-4 books update on bursts not steady streams; 5s vetoed every trade
      reconcile_interval_seconds: 15      # 2026-05-22: 60→15 to close the post-settlement gap where the reconciler hasn't yet detected position-vanished and the leg's silent book trips stale_data_halt_seconds (30s)
      scan_min_interval_seconds: 0.2        # P1 2026-06-05: event-driven scan floor → ~5 scans/s in an active market
      scan_max_interval_seconds: 2.0        # idle backoff → with no feed updates a scan still runs every 2s
      # Align the daily PnL window with HL HIP-4 binary settlement
      # (06:00 UTC = 11:30 IST). Losses on a market that just settled
      # don't carry into the next cycle's cap.
      daily_window_start_hour_utc: 6

  # --- v3.1 theta_harvester ---
  # Live shadow alongside v1. Backtest on HL HIP-4 corpus (2026-05-06 → 18):
  #   v3.1 binary: +$57.28 / 62% hit / $37 max DD
  #   v3.1 bucket: +$29.93 / 80% hit / $71 max DD (YES-only entries; per commit 6fbc78e)
  # Each entry gets its own HL signing key (deploy.hl_accounts.v31).
  # Risk envelopes are per-(strategy, account): the v1 daily_loss_cap and
  # inventory limits above do NOT apply here.
  - name: theta_harvester
    account_alias: v31
    strategy_type: theta_harvester
    paper_mode: false                   # LIVE: real HL orders on v31 account

    allowlist:
      - match:
          class: priceBinary
          underlying: BTC
          venue: hyperliquid              # scope to HL; PM BTC binaries share class+underlying
        max_position_usd: 500             # bumped 300→500 2026-05-24
        stop_loss_pct: null              # theta_harvester drives exits off edge, not stop-loss
        tte_min_seconds: 0
        # 2026-05-21: 14400 → 43200 (4h → 12h). The original 4h cap was
        # calibrated against a BROKEN σ feed (HL ref ticks at 6/s, strategy
        # assumed 60s spacing → σ_RV clipped to 0.05 floor on 100% of ticks
        # → p_model collapsed to {0,1} → near-resolution chop dominated PnL).
        # After fixing the σ-sampling bug (resample ref feed to 1m at the
        # data source), the 4h cap is no longer needed and the optimum
        # shifts to 12h: post-fix HL 26-question sweep gave
        #   tte=4h:  PnL +$95.89, Sharpe 9.72,  maxDD $16.87
        #   tte=12h: PnL +$177.01, Sharpe 16.22, maxDD $15.07  ← ship
        #   tte=24h: PnL +$169.97, Sharpe 14.38, maxDD $18.15
        # See docs/research/2026-05-21-mid-hold-tte-stack.md.
        tte_max_seconds: 43200
        price_extreme_threshold: 0.0     # theta_harvester enters off edge, not extreme price
        price_extreme_max: 1.0
        distance_from_strike_usd_min: 0
        vol_max: 100
        # Router-side cooldown after a close; same value as v1 for symmetry.
        entry_cooldown_seconds: 60
      - match:
          class: priceBucket
          underlying: BTC
          venue: hyperliquid              # scope to HL
        max_position_usd: 500             # bumped 300→500 2026-05-24
        stop_loss_pct: null
        tte_min_seconds: 0
        # 2026-06-05: 43200 → 28800 (12h → 8h). The short hold avoids the
        # late-resolution reversals that drove prod DD (24h is catastrophic; DD
        # bifurcates 8h→low vs 10h→higher). 8h is RETAINED as part of the
        # mechanical σ/timing tilt after the 2026-06-06 overfit rollback (C3) —
        # see theta_overrides below; the tail-for-yield axes were reverted.
        tte_max_seconds: 28800
        price_extreme_threshold: 0.0
        price_extreme_max: 1.0
        distance_from_strike_usd_min: 0
        vol_max: 100
        entry_cooldown_seconds: 60

    blocklist_question_idxs: []

    defaults:
      match: {}
      max_position_usd: 500
      stop_loss_pct: null
      tte_min_seconds: 0
      tte_max_seconds: 43200              # mirror priceBinary/Bucket allowlist — engine reads ThetaHarvesterConfig.tte_max from defaults
      price_extreme_threshold: 0.0
      price_extreme_max: 1.0
      distance_from_strike_usd_min: 0
      vol_max: 100
      entry_cooldown_seconds: 60          # router reads from defaults

    global:
      # 2026-06-02: 1000→1100. v31 saturated at 2 filled positions ($1001.90)
      # which is $1.90 over the old $1000 cap → every 3rd-leg/top-up entry was
      # vetoed with max_total_inventory every tick. With per-position cap $500,
      # 1100 leaves headroom for a 3rd position's first partial fill.
      max_total_inventory_usd: 1100
      max_concurrent_positions: 5
      daily_loss_cap_usd: 100             # tightened in lockstep with per-position cap
      max_strike_distance_pct: 50
      min_recent_volume_usd: 100
      stale_data_halt_seconds: 30
      reconcile_interval_seconds: 15      # 2026-05-22: 60→15 to close the post-settlement gap where the reconciler hasn't yet detected position-vanished and the leg's silent book trips stale_data_halt_seconds (30s)
      scan_min_interval_seconds: 0.2        # P1 2026-06-05: event-driven scan floor → ~5 scans/s in an active market
      scan_max_interval_seconds: 2.0        # idle backoff → with no feed updates a scan still runs every 2s
      # Same rationale as v1 — settlement-aligned window.
      daily_window_start_hour_utc: 6

    theta:
      # 2026-06-05: 3600 → 900 (binary only; buckets override to 2700 below).
      # Independent HL binary walk-forward tune
      # (v31_binary_independent_tune_2026_06_05 /
      # docs/research/2026-06-05-v31-hl-binary-tune.md, n=25, engine bit-identical
      # to prod baseline $830.24). At dt=5, vol_lookback=900 is the worst-half
      # optimum AND lowers maxDD: full $863.51 (+$33), worst-half $385.52 (+$21),
      # maxDD $111.51 (−$13), Sharpe 12.94 vs prod $830.24 / $364.10 / $124.57.
      # 900 is interior (600 worse, 1800+ lower). ⚠️ Validated ONLY at dt=5 —
      # binary stays dt=5 (vol_sampling_dt below); do NOT pair with edge_buffer=0.0
      # (eb=0 + vlb=900 do not stack — combo craters the early half to $207/DD$166,
      # so edge_buffer stays 0.02). dt=2 was rejected for binary (worst-half
      # $364→$250, the OPPOSITE of buckets).
      vol_lookback_seconds: 900
      # 2026-05-30: 60 → 5 (v3.7 T13). v31 + v1 share the BTC reference feed and
      # MUST move in lockstep — the engine conflict-guards a same-symbol cadence
      # mismatch. ⚠️ GATE: ≥1-week paper validation before live cutover (see
      # engine_cadence_port_2026_05_29.md + v1_cadence_validation_2026_05_30.md).
      vol_sampling_dt_seconds: 5
      # 2026-05-24: 0.05 → 0.0 (kill). Post-σ-fix (commit cc44bf6) the 1m
      # bar resampling makes σ_RV never approach the 0.05 floor. HL
      # binary+bucket kill-only ablation produced bit-identical
      # PnL/Sharpe/maxDD/trades vs prod. See docs/research/2026-05-23-v31-final-state.md.
      vol_clip_min: 0.0
      vol_clip_max: 5.0
      edge_buffer: 0.02
      # 2026-05-22: entry fee zeroed alongside take-profit-mode flip. Per the
      # exit_take_profit_mode block below, all fee accounting now lives on
      # the exit side via `exit_fee`. PM + HL A/B (v3.1-exitflip-2026-05-22)
      # confirmed identical trade count / hit rate / max DD with ~+1% PnL.
      fee_taker: 0.0
      half_spread_assumption: 0.005
      drift_lookback_seconds: 3600
      drift_blend: 0.0
      favorite_threshold: 0.85
      # 2026-05-24: 0.20 → null (kill). Upper-edge filter never binds on PM
      # (entries are gated well below 20% edge by edge_buffer + favorite_threshold)
      # and never binds on HL. Both PM walk-forward and HL kill-only ablation
      # produced bit-identical results to prod. See docs/research/2026-05-23-v31-final-state.md.
      edge_max: null
      exit_edge_threshold: 0.0
      time_stop_seconds: 0
      # 2026-05-22: take-profit-style exit edge.
      # Legacy formula `edge_held = held_p - bid - fee_taker; exit if < 0`
      # framed the gate as "is the alpha gone?" — it exits whenever the bid
      # creeps to within one fee of fair value, which made it fire on
      # transient bid spikes during the v31 q=14 churn observed today.
      # New formula `edge_held = bid - held_p - exit_fee; exit if > 0` reads
      # the gate as "is the bid offering above-fair premium net of selling
      # cost?" — only fires on genuine premium.
      # PM + HL A/B (data/sim/runs/v3.1-exitflip-2026-05-22): identical
      # trade count / hit rate / max DD; PnL +$10.70 (PM) / +$1.38 (HL).
      exit_take_profit_mode: true
      exit_fee: 0.0007
      # 2026-05-19 edge-and-tuning memo §4 P5: disabled on HL. The
      # `min_distance_pct=0.002` floor was PM-derived (+$438/yr expected)
      # but on the HL 9-day corpus it cost ~$10 vs running ungated (the
      # 0.20% near-strike band that loses on PM doesn't lose on HL —
      # wider HL spread already prices the gamma risk). PM tuning configs
      # live separately under data/sim/configs/ and keep 0.002.
      min_distance_pct: null
      # 2026-05-19 edge-and-tuning memo §4 P5: disabled on HL alongside
      # min_distance_pct. The bid-based exit edge change (commit c16c0c1)
      # is the primary safety mechanism; the bid-notional floor was
      # belt-and-braces and barely fires (only 1.4% of v1 gate-pass ticks
      # have bid_notional <$10 per the microstructure profile).
      min_bid_notional_usd: 0.0
      # Position topup (2026-05-20): mirrors v1 defaults — both strategies
      # fight the same HL partial-fill problem on thin HIP-4 books.
      topup_enabled: true
      topup_threshold_pct: 0.2
      topup_min_notional_usd: 11.0
      # 2026-05-21: σ-normalized mid-hold distance exit. PM walk-forward
      # validated +50-68% PnL OOS over d=0.0 baseline; HL post-σ-fix at
      # d=1.0 / tte=12h: $177 PnL / Sharpe 16. 1.0 is the production
      # ceiling — d=1.5 triggers a re-entry cascade (see summary).
      exit_safety_d: 1.0

    # Per-question.klass theta overrides. Each class maps to a PARTIAL theta
    # block: only the listed fields override the shared `theta:` defaults above
    # (resolution: per-class override > instance theta). Unknown knobs fail loud
    # (extra='forbid', same as `theta:`). vol_sampling_dt_seconds is now
    # overridable per class — the engine buckets the shared BTC reference feed at
    # each registered cadence independently ((symbol, dt) MarketState + Scanner
    # cadence_by_class), so buckets can run dt=2 while binary + v1 stay dt=5.
    # Omitting this block is bit-identical to today.
    #
    # 2026-06-06: the 2026-06-05 "best sim" bucket tune
    # (v31_bucket_independent_tune_2026_06_05: fav0.80/eb0.005/esd0/dt2/tte8h/
    # vlb2700 → backtest $1135.72, Sharpe 26.94, maxDD $0 on n=27) was OVERFIT to
    # a zero-loss sample and is rolled back here to a prod-anchored tilt (C3).
    # Evidence (artifacts/recon/): the corpus had ZERO favorites lose at
    # settlement, so maxDD=$0 was tail-blind. A loss-injection stress (each
    # favorite loses with its implied prob 1−entry) collapsed the "best sim" to
    # ~$0 expected / 50% chance of a net loss (5th-pct −$1198). Decomposing the
    # +$723 vs prod: +$435 came from the mechanical σ/timing tilt
    # (vol_lookback 2700 / dt 2; tte 8h on the allowlist above) and only +$289
    # from the tail-for-yield knobs (fav 0.85→0.80, eb 0.02→0.005);
    # exit_safety_d was inert ($847 esd1.0 ≈ $874 esd0). So C3 = KEEP the
    # mechanical tilt, RESTORE the three risk gates to the binary baseline. C3 is
    # strictly better risk-adjusted under the stress: median +$203, P(net<0) 41%
    # (vs the overfit's 50%). dt=2 is applied PER-CLASS (bucket only) so binary +
    # v1 stay on the dt=5 feed untouched. The risk gates below MUST stay ≥ the
    # binary baseline (guarded by
    # test_bucket_override_risk_gates_not_below_binary); re-tune only at n≥50 with
    # adverse settlements in a TRUE holdout, selecting on a tail-aware metric.
    theta_overrides:
      priceBucket:
        favorite_threshold: 0.85       # C3: restored to binary (was 0.80 overfit)
        edge_buffer: 0.02              # C3: restored to binary (was 0.005 overfit)
        exit_safety_d: 1.0             # C3: restored mid-hold exit (was 0.0; inert but defensive)
        vol_lookback_seconds: 2700     # mechanical tilt (vs binary 900)
        vol_sampling_dt_seconds: 2     # per-class mechanical tilt; binary + v1 stay dt=5

  # --- v3.1 Polymarket ---
  # PM ablation knobs: post-2026-05-23 walk-forward (see Appendix C of
  # docs/v31-polymarket-live-plan.md and [[v31-final-state-2026-05-23]]) picked
  # favorite_threshold=0.90, edge_buffer=0.03. Operator override 2026-05-26:
  # 16h live shadow on the v31_pm funder produced 0 entries — gate log showed
  # edge_no peaking at +0.021 (below the 0.03 buffer) on a market where p_model
  # tracked p_market within ~2pp. Aligned the two knobs to HL v31's
  # favorite_threshold=0.85 / edge_buffer=0.02 to unblock entries during burn-in.
  # tte_max_seconds=86400 (PM markets are 24h) stays PM-specific.
  # PM-tuned → HL transfer was previously shown to hurt HL PnL by 40%; the
  # reverse direction (HL knobs on PM) is being validated live during burn-in.
  # paper_mode=true until Phase 8 lands py-clob-client-v2; Phases 6+7+8
  # flip this on once paper-mode order I/O and live wiring are in.
  # fee_model/fee_rate are NEW config fields (Phase 7 plumbs them through to
  # the strategy); the strategy ignores them today but they round-trip
  # through YAML so the v31_pm slot YAML is stable across phases.
  - name: theta_harvester
    account_alias: v31_pm                   # → deploy.accounts.v31_pm
    strategy_type: theta_harvester
    paper_mode: false                       # LIVE: real PM orders on v31_pm funder
    # PM "BTC Up or Down" markets resolve on the Binance SPOT 1m close at the
    # strike-ref ts, and the PM tuning (fav=0.9, eb=0.03) was calibrated
    # against Binance spot σ + Binance p_model. Use Binance SPOT as the
    # reference so live price, σ, and captured strike are all spot (zero
    # perp/spot basis). HL "BTC" mark lags Binance on macro moves and was
    # the previous (buggy) default; perp BTCUSDT was the interim reference.
    reference_symbol: BTCUSDT_SPOT   # PM settles on Binance SPOT 1m close; price+σ+strike all spot (no perp basis)
    # 2026-06-01: σ/OHLC from the dense Binance SPOT BBO (bookTicker, sub-second)
    # instead of the 3s mark poll. The engine ingests a dedicated BTCUSDT_SPOT bbo
    # reference feed (engine/main.py:binance_spot_reference_subscription). dt=5 (see theta block).
    # Lockstep with v1_pm (shared BTCUSDT_SPOT feed — conflict-guarded; both dt=5/bbo).
    # This is the live σ reference PM has (mark was never fed to the engine).
    reference_sigma_source: bbo

    allowlist:
      - match:
          class: priceBinary
          underlying: BTC
          venue: polymarket                 # scope to PM; HL BTC binaries share class+underlying
          series_slug: btc-up-or-down-daily # one PM Gamma series (adapter also subscribes ETH/XRP/…)
        max_position_usd: 50                # burn-in cap (was 200 ablation)
        stop_loss_pct: null
        tte_min_seconds: 0
        tte_max_seconds: 86400              # PM 24h (vs HL 43200)
        price_extreme_threshold: 0.0
        price_extreme_max: 1.0
        distance_from_strike_usd_min: 0
        vol_max: 100
        entry_cooldown_seconds: 60

    blocklist_question_idxs: []

    defaults:
      match: {}
      max_position_usd: 50                  # burn-in cap (was 200 ablation)
      stop_loss_pct: null
      tte_min_seconds: 0
      tte_max_seconds: 86400
      price_extreme_threshold: 0.0
      price_extreme_max: 1.0
      distance_from_strike_usd_min: 0
      vol_max: 100
      entry_cooldown_seconds: 60

    global:
      # Burn-in caps for first-week live operation (was $1000 inventory at ablation).
      # With max_position=$50 and max_total_inventory=$100, effective concurrency is
      # 2 positions; max_concurrent_positions=5 stays as a defense-in-depth ceiling.
      max_total_inventory_usd: 100
      max_concurrent_positions: 5
      daily_loss_cap_usd: 100               # operator-locked
      max_strike_distance_pct: 50
      min_recent_volume_usd: 100
      stale_data_halt_seconds: 180          # 2026-06-04: PM CLOB favorite books legitimately go quiet >30s (a held 0.89 leg updated ~1/100s) → 30s flapped StaleDataHalt + stale_data entry-veto every ~1-2 min. 180s stops the flap while still vetoing entry on a genuinely frozen book. HL/HIP-4 stays 30s (burst feed).
      reconcile_interval_seconds: 15
      scan_min_interval_seconds: 0.2        # P1 2026-06-05: event-driven scan floor → ~5 scans/s in an active market
      scan_max_interval_seconds: 2.0        # idle backoff → with no feed updates a scan still runs every 2s
      daily_window_start_hour_utc: 6
      # Depth-walk slippage cap — ~0.5¢ at a 0.95-favorite leg. PM books are
      # thin at the top; the gate clamps intent size down to available
      # at-limit liquidity (used to veto outright; partial fills now flow
      # through and the strategy's topup loop closes the residual). HL slots
      # leave this at 0 (default) because the BboEvent feed doesn't populate
      # ask_levels.
      max_slippage_pct: 0.005
      # Floor on (clamped) order notional. Stops the depth-walk clamp from
      # submitting a $0.95 order when only 1 share is on the inside ask.
      # $11 is the same threshold the strategy's topup uses (one 5-share
      # clip at a 0.95 favorite ≈ $4.75 + headroom).
      min_order_notional_usd: 11.0

    theta:
      vol_lookback_seconds: 3600
      vol_sampling_dt_seconds: 5            # dt=5 (was 60); LOCKSTEP with v1_pm on shared BTCUSDT_SPOT bbo feed. theta σ=bipower (return-based, clean Pareto at dt=5: backtest $229 vs $195)
      vol_clip_min: 0.0
      vol_clip_max: 5.0
      # 2026-06-04 (SHR-65): the dt=5 backtest above was validated with the
      # jump-robust bipower σ. The key was never settable before SHR-65, so live
      # silently ran sample_std; now plumbed, set it to match the backtest.
      vol_estimator: bipower
      edge_buffer: 0.02                     # aligned with HL v31 (was 0.03 PM-tuned) — 16h live shadow took 0 trades; relaxing to HL band per operator call 2026-05-26
      fee_taker: 0.0
      half_spread_assumption: 0.005
      drift_lookback_seconds: 3600
      drift_blend: 0.0
      favorite_threshold: 0.85              # aligned with HL v31 (was 0.90 PM-tuned) — see edge_buffer note
      edge_max: null
      exit_edge_threshold: 0.0
      time_stop_seconds: 0
      exit_take_profit_mode: true
      exit_fee: 0.0007
      min_distance_pct: null
      min_bid_notional_usd: 10.0            # safety gate kept per [[feedback-keep-safety-gates]]
      # 2026-05-27: enabled. The "no partial fills" assumption was wrong —
      # PM CLOB IOC partial-fills naturally; the risk-gate depth-walk now
      # clamps intent size to inside-ask depth (was: outright veto). Topup
      # re-evaluates entry gates every scan tick and closes the residual
      # shortfall up to max_position_usd when liquidity returns.
      topup_enabled: true
      topup_threshold_pct: 0.2
      topup_min_notional_usd: 11.0
      exit_safety_d: 1.0
      # fee_model=pm_binary selects Polymarket's published taker curve
      # f(p) = fee_rate · p · (1−p). Plumbed end-to-end (config → strategy
      # entry edge) since Phase 7.
      fee_model: pm_binary
      fee_rate: 0.07

  # --- v1 Polymarket ---
  # Late-resolution arb on PM BTC daily Up/Down binaries. Walk-forward sweep
  # (2026-05-27, /tmp/v1_pm_fee_sweep) confirmed v1 stays profitable under the
  # pm_binary fee curve at the existing prod config: thr=0.85, exit_safety_d=1.0
  # → $556.65 / 5 OOS splits, max DD $101, 464 trades. Fee haircut vs flat is
  # ~20%; optimum cell does not shift between fee models. Reusing HL v1's tuned
  # knobs (size_cap_near_strike_pct=1.0, use_bid_for_entry_gate=false on PM
  # because PM spreads are tight enough that bid≈ask).
  - name: late_resolution
    account_alias: v1_pm                    # → deploy.accounts.v1_pm
    strategy_type: late_resolution
    paper_mode: false                       # LIVE: real PM orders on v1_pm funder
    # PM "BTC Up or Down" markets resolve on the Binance SPOT 1m close at the
    # strike-ref ts, same as v31_pm. Use Binance SPOT as the σ + safety_d
    # reference so live price, σ, and captured strike are all spot (no perp basis).
    reference_symbol: BTCUSDT_SPOT   # PM settles on Binance SPOT 1m close; price+σ+strike all spot (no perp basis)
    # 2026-06-01: σ/OHLC from dense Binance SPOT BBO (see v31_pm note). Lockstep with
    # v31_pm on the shared BTCUSDT_SPOT feed at dt=5. v1_pm uses the validated dt=5 config
    # (parkinson / min_safety_d 3.0 / λ 0.97 — backtest $358 vs dt=60 $326). The bbo
    # OHLC feeds the H/L bars Parkinson needs (engine recent_hl_bars).
    reference_sigma_source: bbo

    allowlist:
      - match:
          class: priceBinary
          underlying: BTC
          venue: polymarket                 # scope to PM; HL BTC binaries share class+underlying
          series_slug: btc-up-or-down-daily # one PM Gamma series (adapter also subscribes ETH/XRP/…)
        max_position_usd: 50                # burn-in cap (mirrors v31_pm first-week)
        stop_loss_pct: null
        tte_min_seconds: 0
        tte_max_seconds: 7200               # v1's near-resolution window (PM 24h markets, only enter inside last 2h)
        price_extreme_threshold: 0.85       # walk-forward winner under both fee models
        price_extreme_max: 0.99
        min_safety_d: 3.0                   # dt=5 retune (was 1.0) — denser data affords selectivity
        vol_lookback_seconds: 3600
        exit_safety_d: 1.0                  # +$140 PnL / cuts DD from $228 to $101 vs disabled
        vol_ewma_lambda: 0.97               # dt=5 retune (was 0.85) — 0.85 is jumpy on 5s bars
        vol_estimator: parkinson            # range-based; robust to 5s bid-ask bounce (needs H/L, now fed via bbo OHLC)
        vol_sampling_dt_seconds: 5          # LOCKSTEP with v31_pm on shared BTCUSDT_SPOT bbo feed
        distance_from_strike_usd_min: 0
        vol_max: 100
        # Near-strike low-ask size cap — same trio v1 uses on HL. The
        # walk-forward kept this enabled so PM behavior matches.
        size_cap_near_strike_pct: 1.0
        size_cap_max_dist_pct: 1.5
        size_cap_min_ask: 0.88
        # PM has tight spreads, so the bid-vs-ask entry signal is a no-op.
        # Keep the gate on ask (HL-only switch).
        use_bid_for_entry_gate: false
        # Safety gate per [[feedback-keep-safety-gates]] — kept even though
        # PM bid notionals are typically thousands of dollars.
        min_bid_notional_usd: 10.0
        entry_cooldown_seconds: 60
        # Fee declaration. Strategy gates don't read these (v1 has no edge
        # formula), but the live config carries an explicit declaration of the
        # fee curve the slot was tuned under.
        fee_model: pm_binary
        fee_rate: 0.07

    blocklist_question_idxs: []

    defaults:
      match: {}
      max_position_usd: 50                  # burn-in cap
      stop_loss_pct: null
      tte_min_seconds: 0
      tte_max_seconds: 7200
      price_extreme_threshold: 0.85
      price_extreme_max: 0.99
      min_safety_d: 3.0                     # dt=5 retune (was 1.0)
      vol_lookback_seconds: 3600
      exit_safety_d: 1.0
      vol_ewma_lambda: 0.97                 # dt=5 retune (was 0.85)
      vol_estimator: parkinson              # dt=5 retune (was stdev default)
      vol_sampling_dt_seconds: 5            # LOCKSTEP with v31_pm
      distance_from_strike_usd_min: 0
      vol_max: 100
      size_cap_near_strike_pct: 1.0
      size_cap_max_dist_pct: 1.5
      size_cap_min_ask: 0.88
      use_bid_for_entry_gate: false
      min_bid_notional_usd: 10.0
      entry_cooldown_seconds: 60
      # PM has no partial fills (CLOB is all-or-nothing per level), so the
      # topup machinery is dead weight here. Disable to keep behavior clean.
      topup_enabled: false
      topup_threshold_pct: 0.2
      topup_min_notional_usd: 11.0
      fee_model: pm_binary
      fee_rate: 0.07

    global:
      # Burn-in caps for first-week live operation (mirror v31_pm).
      max_total_inventory_usd: 100
      max_concurrent_positions: 5
      daily_loss_cap_usd: 100
      max_strike_distance_pct: 50
      min_recent_volume_usd: 100
      stale_data_halt_seconds: 180          # 2026-06-04: see v31_pm — PM favorite books go quiet >30s, 180s stops the StaleDataHalt flap; HL/HIP-4 stays 30s.
      reconcile_interval_seconds: 15
      scan_min_interval_seconds: 0.2        # P1 2026-06-05: event-driven scan floor → ~5 scans/s in an active market
      scan_max_interval_seconds: 2.0        # idle backoff → with no feed updates a scan still runs every 2s
      daily_window_start_hour_utc: 6
      # Depth-walk slippage cap — same as v31_pm. PM books are thin at top
      # so we cap blended-fill slippage to ~0.5¢ at a 0.95-favorite leg.
      max_slippage_pct: 0.005

