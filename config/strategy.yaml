  # since 2026-06-16; this takes HYPE priceBinary LIVE on the SAME v31 wallet via
  # a distinct alias (deploy.accounts.v31_hype reuses the v31 key — see deploy.yaml).
  #
  # WHY A SEPARATE SLOT (not a HYPE entry on the v31 slot above):
  #   - reference_symbol is a per-slot scalar; the v31 slot is BTC. HYPE needs its
  #     own slot so σ/p_model read the HL HYPE perp (reference_symbol: HYPE), not BTC.
  #   - theta params are shared per-class; HYPE needs its own vol_lookback (3600)
  #     which can only live in its own theta block.
  #
  # PARAMS = the tail-safe full-grid winner (INDEPENDENTLY tuned; the BTC-binary
  # block loses on HYPE). Absolute values: vol_lookback=3600, vol_sampling_dt=5,
  # tte_max=43200, min_safety_d=2.5, exit_safety_d=1.0, favorite_threshold=0.85,
  # edge_buffer=0.02. The decisive lever is the 1h σ-window: HYPE's higher realised
  # σ (~0.62–0.73 vs BTC ~0.5) needs it to keep safety_d stable (a short window made
  # the soft exit whipsaw winners). favorite_threshold/edge_buffer are inert across
  # the grid. NB: the BTC v31 binary was concurrently retuned (bba75d4: vlb1800/
  # fav0.80/eb0.01) — do NOT read these as a diff from BTC; they are HYPE-native.
  # Full grid: full +$123 / both walk-forward halves positive / Sharpe 23.8 /
  # stressed EV +$104 / 5th-pct +$35 / P(loss) 1.7%.
  #
  # ⚠️ EVIDENCE IS n=6 (corpus 2026-06-16→06-21). Promising, NOT statistically
  # settled — every backtest "winner" posts realized maxDD=$0 only because the
  # 6-question corpus never sampled a losing held favorite; the positive tail rests
  # on the loss-injection model. Watch the first live entries; re-validate the full
  # grid ~2026-06-29 at n≥15. max_position_usd is held at $100 (vs BTC $500) for
  # exactly this reason. See docs/research/2026-06-22-v31-hl-hype-binary-tune.md.
