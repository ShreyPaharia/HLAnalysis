strategy:
  name: late_resolution
  paper_mode: true                      # Phase 1 default — explicit edit to go live

  # Pattern-based allowlist; matches QuestionMetaEvent fields.
  # Auto-applies across rollovers; blocklist for per-instance escape hatch.
  allowlist:
    # 24h regime: enter only inside the last hour, winning leg ≥0.95.
    # Period filter removed because HL HIP-4 markets are 24h, not 1h.
    - match:
        class: priceBinary
        underlying: BTC
      max_position_usd: 100
      stop_loss_pct: 10
      tte_min_seconds: 0
      tte_max_seconds: 3600
      price_extreme_threshold: 0.95
      distance_from_strike_usd_min: 0
      vol_max: 100
    # priceBucket — same per-leg consensus rule across all bucket legs.
    - match:
        class: priceBucket
        underlying: BTC
      max_position_usd: 100
      stop_loss_pct: 10
      tte_min_seconds: 0
      tte_max_seconds: 3600
      price_extreme_threshold: 0.95
      distance_from_strike_usd_min: 0
      vol_max: 100
    # Add more class entries as new question classes are approved for trading

  blocklist_question_idxs: []           # explicit per-instance exclusions

  defaults:
    match: {}
    max_position_usd: 100
    stop_loss_pct: 10
    tte_min_seconds: 0
    tte_max_seconds: 3600
    price_extreme_threshold: 0.95
    distance_from_strike_usd_min: 0
    vol_max: 100

  global:
    max_total_inventory_usd: 500
    max_concurrent_positions: 5
    daily_loss_cap_usd: 200
    max_strike_distance_pct: 50         # 50% — BTC moves 5-10% per day, allow room
    min_recent_volume_usd: 0            # 0 for paper testing; raise for live
    stale_data_halt_seconds: 5
    reconcile_interval_seconds: 60
