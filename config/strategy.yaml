# Multi-strategy live config.
#
# Each entry under `strategies:` is one (strategy, account) pair that the engine
# runs concurrently — shared MarketState/WS, isolated state DB, risk gate,
# router, reconciler, cloid prefix. See DEPLOYMENT.md "Multi-account topology"
# for the wiring rationale and the deploy.yaml twin (`hl_accounts:`).
#
# To add a strategy: append another entry with a distinct `account_alias`
# (must also exist under `deploy.hl_accounts` in deploy.yaml).
# To roll back to a single strategy: keep only the first entry; engine still
# loads it correctly.

strategies:
  - name: late_resolution
    account_alias: v1                   # → deploy.hl_accounts.v1
    strategy_type: late_resolution
    paper_mode: false                   # LIVE: real HL orders

    # Pattern-based allowlist; matches QuestionMetaEvent fields.
    # Auto-applies across rollovers; blocklist for per-instance escape hatch.
    allowlist:
      # ── v1 priceBinary TAKEN DOWN 2026-06-26 ──────────────────────────────
      # Removed the HL BTC priceBinary entry. At live event cadence (0.2/2.0)
      # v31 dominates binary ($1058/wh$492 vs tuned-v1 $336/$133), and running
      # both on the same binary markets just double-stacks one near-resolution
      # signal. v1 now trades **buckets only**; HL BTC binary is v31's book.
      # (Match logic is allowlist-only — with no priceBinary entry, binary
      # questions return None from match_question and v1 never trades them.)
      # priceBucket — same per-leg consensus rule across all bucket legs.
      # NOTE: Polymarket bucket data uses an "above-X binary stack" layout that
      # is incompatible with the strategy's HL mutually-exclusive bucket
      # interpretation (see docs/v1-bucket-sizing-results.md), so the PM corpus
      # cannot be used to tune these params. This entry stays calibrated to the
      # binary params and applies only to HL HIP-4 priceBucket markets (which
      # match the strategy's expected layout). size_cap defaults to disabled
      # here pending HL-bucket-specific tuning.
      - match:
          class: priceBucket
          underlying: BTC
          venue: hyperliquid              # scope to HL
        max_position_usd: 500             # 300→500 2026-06-26 (capital scale-up; v1 is now bucket-only)
        stop_loss_pct: null              # disabled — 1y PM tuning showed any stop hurts net PnL
        tte_min_seconds: 0
        # 2026-06-26: 6h → 8h. Event-cadence retune winner (tune at the live
        # 0.2/2.0 floor; validated at 0.2/2.0): tte8h is a clean Pareto gain —
        # worst-half $236→$348, full $698→$906, Sharpe 19.6→26.2, maxDD stays $0,
        # hit 91→94%. λ kept at 0.97 (0.85 was TOXIC at event cadence, −$93);
        # exit_safety_d kept 0 (any mid-hold/stop exit doom-loops across wide
        # bucket spreads — only v31's exit_spread_hold avoids it). See
        # docs/research/2026-06-24-v1-hl-tiered-tune.md + the event-cadence retune.
        # ⚠️ TAIL: no exit gate ⇒ buy-and-hold; maxDD $0 is tail-blind. Loss-
        # injection at $500/pos: EV≈$0, P(net loss) ~51%, 5th-pct deeply negative
        # on an adverse-settlement cluster. The daily_loss_cap below is the
        # circuit breaker; size accordingly.
        tte_max_seconds: 28800
        price_extreme_threshold: 0.85
        price_extreme_max: 0.999          # HL HIP-4 favorites trade 0.98-0.9999; 0.97 cap blocked every trade live
        min_safety_d: 3.0                 # dt=5 retune; see priceBinary slot
        vol_lookback_seconds: 3600
        exit_safety_d: 0.0                # mid-hold disabled on buckets per retune
        vol_ewma_lambda: 0.97             # dt=5 retune; see priceBinary slot
        vol_estimator: parkinson          # see priceBinary slot — 2026-05-30 cadence validation
        vol_sampling_dt_seconds: 5        # LOCKSTEP with v31 on shared BTC feed; ⚠️ paper-validate first
        distance_from_strike_usd_min: 0
        vol_max: 100
        # See priceBinary entry above for rationale on these three.
        use_bid_for_entry_gate: true
        min_bid_notional_usd: 25.0
        entry_cooldown_seconds: 60
      # Add more class entries as new question classes are approved for trading

    blocklist_question_idxs: []         # explicit per-instance exclusions

    defaults:
      match: {}
      max_position_usd: 500               # 300→500 2026-06-26; mirrors bucket allowlist; build_late_resolution_config reads from here
      stop_loss_pct: null
      tte_min_seconds: 0
      tte_max_seconds: 28800              # bucket-only now; mirror the 8h allowlist value
      price_extreme_threshold: 0.85
      price_extreme_max: 0.999
      min_safety_d: 3.0                    # dt=5 retune; see priceBinary slot
      vol_lookback_seconds: 3600
      exit_safety_d: 1.0
      vol_ewma_lambda: 0.97                # dt=5 retune; see priceBinary slot
      vol_estimator: parkinson            # see priceBinary slot — 2026-05-30 cadence validation
      vol_sampling_dt_seconds: 5          # LOCKSTEP with v31 on shared BTC feed; ⚠️ paper-validate first
      distance_from_strike_usd_min: 0
      vol_max: 100
      # See per-allowlist entries above; engine `build_late_resolution_config`
      # reads from defaults here, so the strategy instance always sees this cap.
      size_cap_near_strike_pct: 1.0
      size_cap_max_dist_pct: 1.5
      size_cap_min_ask: 0.88
      use_bid_for_entry_gate: true        # 2026-05-19 churn fix; see allowlist comment
      min_bid_notional_usd: 10.0
      entry_cooldown_seconds: 60          # router uses this for the post-exit veto
      # Position topup (2026-05-20): when an IOC partial-fill leaves the held
      # position under target by ≥ 20%, re-run entry gates against the current
      # book and emit a second ENTER for the shortfall. Exit-eval always wins.
      topup_enabled: true
      topup_threshold_pct: 0.2
      topup_min_notional_usd: 11.0        # HL per-order min is $10; buffer to 11

    global:
      max_total_inventory_usd: 1500       # 1000→1500 2026-06-26: ≈3 concurrent $500 bucket positions (was 3.3× $300)
      max_concurrent_positions: 5
      # 100→150 2026-06-26, scaled with the $500 per-position cap. ⚠️ With v1
      # buckets running NO exit gate (buy-and-hold), this daily realized-loss cap
      # is the PRIMARY tail protection: one adverse bucket settlement (~−$500)
      # trips it and halts the slot for the UTC day (operator clears). Tighten for
      # more protection / loosen for fewer halts — this is the key risk knob.
      daily_loss_cap_usd: 150
      max_strike_distance_pct: 50       # 50% — BTC moves 5-10% per day, allow room
      min_recent_volume_usd: 100        # HL HIP-4 binaries are inherently thin; 1000 vetoed every trade
      stale_data_halt_seconds: 30       # HIP-4 books update on bursts not steady streams; 5s vetoed every trade
      reconcile_interval_seconds: 15      # 2026-05-22: 60→15 to close the post-settlement gap where the reconciler hasn't yet detected position-vanished and the leg's silent book trips stale_data_halt_seconds (30s)
      scan_min_interval_seconds: 0.2        # P1 2026-06-05: event-driven scan floor → ~5 scans/s in an active market
      scan_max_interval_seconds: 2.0        # idle backoff → with no feed updates a scan still runs every 2s
      # Align the daily PnL window with HL HIP-4 binary settlement
      # (06:00 UTC = 11:30 IST). Losses on a market that just settled
      # don't carry into the next cycle's cap.
      daily_window_start_hour_utc: 6

  # --- v3.1 theta_harvester ---
  # Live shadow alongside v1. Backtest on HL HIP-4 corpus (2026-05-06 → 18):
  #   v3.1 binary: +$57.28 / 62% hit / $37 max DD
  #   v3.1 bucket: +$29.93 / 80% hit / $71 max DD (YES-only entries; per commit 6fbc78e)
  # Each entry gets its own HL signing key (deploy.hl_accounts.v31).
  # Risk envelopes are per-(strategy, account): the v1 daily_loss_cap and
  # inventory limits above do NOT apply here.
  - name: theta_harvester
    account_alias: v31
    strategy_type: theta_harvester
    paper_mode: false                   # LIVE: real HL orders on v31 account

    allowlist:
      - match:
          class: priceBinary
          underlying: BTC
          venue: hyperliquid              # scope to HL; PM BTC binaries share class+underlying
        max_position_usd: 750             # 500→750 2026-06-26 (capital scale-up)
        stop_loss_pct: null              # theta_harvester drives exits off edge, not stop-loss
        tte_min_seconds: 0
        # 2026-05-21: 14400 → 43200 (4h → 12h). The original 4h cap was
        # calibrated against a BROKEN σ feed (HL ref ticks at 6/s, strategy
        # assumed 60s spacing → σ_RV clipped to 0.05 floor on 100% of ticks
        # → p_model collapsed to {0,1} → near-resolution chop dominated PnL).
        # After fixing the σ-sampling bug (resample ref feed to 1m at the
        # data source), the 4h cap is no longer needed and the optimum
        # shifts to 12h: post-fix HL 26-question sweep gave
        #   tte=4h:  PnL +$95.89, Sharpe 9.72,  maxDD $16.87
        #   tte=12h: PnL +$177.01, Sharpe 16.22, maxDD $15.07  ← ship
        #   tte=24h: PnL +$169.97, Sharpe 14.38, maxDD $18.15
        # See docs/research/2026-05-21-mid-hold-tte-stack.md.
        tte_max_seconds: 43200
        price_extreme_threshold: 0.0     # theta_harvester enters off edge, not extreme price
        price_extreme_max: 1.0
        distance_from_strike_usd_min: 0
        vol_max: 100
        # Router-side cooldown after a close; same value as v1 for symmetry.
        entry_cooldown_seconds: 60
      - match:
          class: priceBucket
          underlying: BTC
          venue: hyperliquid              # scope to HL
        max_position_usd: 750             # 500→750 2026-06-26 (capital scale-up)
        stop_loss_pct: null
        tte_min_seconds: 0
        # 2026-06-05: 43200 → 28800 (12h → 8h). The short hold avoids the
        # late-resolution reversals that drove prod DD (24h is catastrophic; DD
        # bifurcates 8h→low vs 10h→higher). 8h is RETAINED as part of the
        # mechanical σ/timing tilt after the 2026-06-06 overfit rollback (C3) —
        # see theta_overrides below; the tail-for-yield axes were reverted.
        tte_max_seconds: 28800
        price_extreme_threshold: 0.0
        price_extreme_max: 1.0
        distance_from_strike_usd_min: 0
        vol_max: 100
        entry_cooldown_seconds: 60

    blocklist_question_idxs: []

    defaults:
      match: {}
      max_position_usd: 750               # 500→750 2026-06-26 (capital scale-up)
      stop_loss_pct: null
      tte_min_seconds: 0
      tte_max_seconds: 43200              # mirror priceBinary/Bucket allowlist — engine reads ThetaHarvesterConfig.tte_max from defaults
      price_extreme_threshold: 0.0
      price_extreme_max: 1.0
      distance_from_strike_usd_min: 0
      vol_max: 100
      entry_cooldown_seconds: 60          # router reads from defaults

    global:
      # 2026-06-02: 1000→1100 (headroom for a 3rd position's partial fill at
      # $500/pos). 2026-06-26: 1100→1650 with the $750 per-position cap — same
      # logic: 2 filled positions = $1500, +$150 headroom for a 3rd partial.
      max_total_inventory_usd: 1650
      max_concurrent_positions: 5
      daily_loss_cap_usd: 150             # 100→150 2026-06-26, scaled with the $750 per-position cap (v31 exits are tail-protected: esd band + exit_spread_hold)
      max_strike_distance_pct: 50
      min_recent_volume_usd: 100
      stale_data_halt_seconds: 30
      reconcile_interval_seconds: 15      # 2026-05-22: 60→15 to close the post-settlement gap where the reconciler hasn't yet detected position-vanished and the leg's silent book trips stale_data_halt_seconds (30s)
      scan_min_interval_seconds: 0.2        # P1 2026-06-05: event-driven scan floor → ~5 scans/s in an active market
      scan_max_interval_seconds: 2.0        # idle backoff → with no feed updates a scan still runs every 2s
      # Same rationale as v1 — settlement-aligned window.
      daily_window_start_hour_utc: 6

    theta:
      # 2026-06-22: 900 → 1800. Full theta-axes walk-forward tune on the RAISED band
      # (v31_hl_binary_axes_tune_2026_06_22 /
      # docs/research/2026-06-22-v31-hl-binary-tune.md, n=42 corpus 2026-05-10..06-21,
      # ranked by worst-half PnL + loss-injection tail stress). vol_lookback=1800 is
      # the load-bearing lever: every vlb1800 grid cell tops the table and it lowers
      # maxDD ($199→$177) regardless of the other knobs — a 30-min σ window is
      # steadier than 15-min, raising entry selectivity (329→212 trades, hit 71→79%).
      # SUPERSEDES the 2026-06-05 reasoning below: that tune ranked full PnL on the
      # OLD msd2.0/esd1.0 band (n=25) and found "900 interior / 1800+ lower"; under
      # the 2026-06-22 msd2.5/esd1.5 band the worst-half optimum moved to 1800.
      # Shipped jointly with favorite_threshold 0.85→0.80 + edge_buffer 0.02→0.01
      # (those recover the full PnL the longer lookback gives up). ⚠️ Validated ONLY
      # at dt=5 (binary stays dt=5); same n=42 tail-deficient corpus as the band
      # retune → re-confirm on fresh data ~2026-06-29. (Earlier 2026-06-05 note:
      # 3600→900, dt=5 worst-half optimum on the old band — kept for history.)
      vol_lookback_seconds: 1800
      # 2026-05-30: 60 → 5 (v3.7 T13). v31 + v1 share the BTC reference feed and
      # MUST move in lockstep — the engine conflict-guards a same-symbol cadence
      # mismatch. ⚠️ GATE: ≥1-week paper validation before live cutover (see
      # engine_cadence_port_2026_05_29.md + v1_cadence_validation_2026_05_30.md).
      vol_sampling_dt_seconds: 5
      # 2026-05-24: 0.05 → 0.0 (kill). Post-σ-fix (commit cc44bf6) the 1m
      # bar resampling makes σ_RV never approach the 0.05 floor. HL
      # binary+bucket kill-only ablation produced bit-identical
      # PnL/Sharpe/maxDD/trades vs prod. See docs/research/2026-05-23-v31-final-state.md.
      vol_clip_min: 0.0
      vol_clip_max: 5.0
      # 2026-06-22: 0.02 → 0.01. Same axes tune as vol_lookback above — paired with
      # vlb=1800, edge_buffer ≤0.01 lifts worst-half (the old "eb stays 0.02 / eb=0
      # craters the early half" warning was measured against vlb=900; with vlb=1800
      # the early half no longer collapses). eb=0.03 is strictly worse.
      edge_buffer: 0.01
      # 2026-05-22: entry fee zeroed alongside take-profit-mode flip. Per the
      # exit_take_profit_mode block below, all fee accounting now lives on
      # the exit side via `exit_fee`. PM + HL A/B (v3.1-exitflip-2026-05-22)
      # confirmed identical trade count / hit rate / max DD with ~+1% PnL.
      fee_taker: 0.0
      half_spread_assumption: 0.005
      drift_lookback_seconds: 3600
      drift_blend: 0.0
      # 2026-06-22: 0.85 → 0.80 (axes tune, see vol_lookback above). 0.80 beats 0.85
      # on worst-half; 0.90 is much worse (worst-half $104, maxDD $256). Secondary
      # lever — admits slightly less-extreme favorites, recovering PnL the longer
      # vol_lookback trades away.
      favorite_threshold: 0.80
      # 2026-05-24: 0.20 → null (kill). Upper-edge filter never binds on PM
      # (entries are gated well below 20% edge by edge_buffer + favorite_threshold)
      # and never binds on HL. Both PM walk-forward and HL kill-only ablation
      # produced bit-identical results to prod. See docs/research/2026-05-23-v31-final-state.md.
      edge_max: null
      # 2026-06-18: REVERTED to msd2 (re-enable exits). The 2026-06-17 buy-and-hold
      # (exit_edge off + exit_safety_d off, keeping min_safety_d=2) looked best on
      # REALIZED PnL ($1404 / maxDD $0), but that maxDD is tail-blind — the corpus
      # never sampled a losing favorite. A loss-injection stress (each favorite
      # flips at its implied rate ~10%) collapsed buy-and-hold to EV ≈ $0 / P(net
      # loss) 48% / 5th-pct −$1.7k (a flipped favorite loses the FULL stake with no
      # exit), vs msd2 (exits kept) EV ≈ $500-600 / P(loss) <1% / 5th-pct +$200.
      # A hard bid stop-loss was WORSE (it churns on volatile favorites that
      # dip-and-recover: −$2.6k at 15% / leaks badly even at 50%). The σ-based
      # soft exits are the efficient tail protector → keep them on. See
      # docs/research/2026-06-18-hl-buy-and-hold-tail-stress.md.
      exit_edge_threshold: 0.0
      time_stop_seconds: 0
      # 2026-05-22: take-profit-style exit edge.
      # Legacy formula `edge_held = held_p - bid - fee_taker; exit if < 0`
      # framed the gate as "is the alpha gone?" — it exits whenever the bid
      # creeps to within one fee of fair value, which made it fire on
      # transient bid spikes during the v31 q=14 churn observed today.
      # New formula `edge_held = bid - held_p - exit_fee; exit if > 0` reads
      # the gate as "is the bid offering above-fair premium net of selling
      # cost?" — only fires on genuine premium.
      # PM + HL A/B (data/sim/runs/v3.1-exitflip-2026-05-22): identical
      # trade count / hit rate / max DD; PnL +$10.70 (PM) / +$1.38 (HL).
      exit_take_profit_mode: true
      exit_fee: 0.0007
      # 2026-05-19 edge-and-tuning memo §4 P5: disabled on HL. The
      # `min_distance_pct=0.002` floor was PM-derived (+$438/yr expected)
      # but on the HL 9-day corpus it cost ~$10 vs running ungated (the
      # 0.20% near-strike band that loses on PM doesn't lose on HL —
      # wider HL spread already prices the gamma risk). PM tuning configs
      # live separately under data/sim/configs/ and keep 0.002.
      min_distance_pct: null
      # 2026-05-19 edge-and-tuning memo §4 P5: disabled on HL alongside
      # min_distance_pct. The bid-based exit edge change (commit c16c0c1)
      # is the primary safety mechanism; the bid-notional floor was
      # belt-and-braces and barely fires (only 1.4% of v1 gate-pass ticks
      # have bid_notional <$10 per the microstructure profile).
      min_bid_notional_usd: 0.0
      # Position topup (2026-05-20): mirrors v1 defaults — both strategies
      # fight the same HL partial-fill problem on thin HIP-4 books.
      topup_enabled: true
      topup_threshold_pct: 0.2
      topup_min_notional_usd: 11.0
      # 2026-05-21: σ-normalized mid-hold distance exit. PM walk-forward
      # validated +50-68% PnL OOS over d=0.0 baseline; HL post-σ-fix at
      # d=1.0 / tte=12h: $177 PnL / Sharpe 16. 1.0 is the production
      # ceiling — d=1.5 triggers a re-entry cascade (see summary).
      # 2026-06-18: RE-ENABLED (revert of the 2026-06-17 buy-and-hold). This
      # σ√τ-distance mid-hold exit is the load-bearing tail protector on a
      # cliff-payoff instrument: it fires on genuine adverse drift toward the
      # adverse boundary (not on bid noise), capping a flipping favorite at
      # ~$50-150 instead of the full ~$500 stake. The loss-injection stress
      # (see exit_edge_threshold note) makes msd2 (this on + entry gate) the
      # risk-adjusted winner; buy-and-hold's higher realized PnL was a tail-blind
      # 2026-06-22: 1.0 → 1.5. Independent band sweep + loss-injection tail stress
      # + round-trip fee stress (docs/research/2026-06-22-v31-hl-safetyd-band.md,
      # n=42 corpus 05-10→06-21) found the old (msd2.0/esd1.0) band poorly placed:
      # worst-half −$27, the HIGHEST maxDD in the grid ($343). Raising to msd2.5/esd1.5
      # dominates on walk-forward worst-half (+$178), maxDD ($199), Sharpe (7.2), AND
      # the tail stress (EV $503 / P(loss) 0.6% vs $415 / 1.5%), retaining ~99% PnL
      # under a 3.5× round-trip-fee bump (not a churn artifact). The OLD "1.0 is the
      # production ceiling / d=1.5 → re-entry cascade" note no longer holds — that
      # cascade was under the low entry floor; at msd=2.5 the higher floor suppresses
      # re-entry (esd1.5 = 329 trades, FEWER than the old 431). ⚠️ n=42 single corpus,
      # tail-deficient (relative ranking robust, absolute $ inflated) — watch first
      # live exits.
      # ⏭ esd=2.0 tested STRICTLY BETTER on this corpus (full $827 / worst-half $247 /
      # maxDD $42 / Sharpe 13.5 / stressed EV $711 / P(loss) 0%) but earns it via more
      # aggressive exit/re-entry (468 trades) → most fill-model-sensitive. RE-VALIDATE
      # ~2026-06-29 (≥1 week of live data + a fresh backtest); if esd=2.0 still wins,
      # promote binary to 2.0 (and re-check the bucket floor decoupling below).
      exit_safety_d: 1.5
      # Entry-side safety_d floor. 2026-06-22: 2.0 → 2.5 (see exit_safety_d note).
      # Enter only when the favorite is ≥2.5 σ√τ from its adverse boundary; with the
      # raised exit this forms a tighter, higher hysteresis band [1.5, 2.5] that
      # prevents the re-entry churn aggressive exits would otherwise cause.
      min_safety_d: 2.5

    # Per-question.klass theta overrides. Each class maps to a PARTIAL theta
    # block: only the listed fields override the shared `theta:` defaults above
    # (resolution: per-class override > instance theta). Unknown knobs fail loud
    # (extra='forbid', same as `theta:`). vol_sampling_dt_seconds is now
    # overridable per class — the engine buckets the shared BTC reference feed at
    # each registered cadence independently ((symbol, dt) MarketState + Scanner
    # cadence_by_class), so buckets can run dt=2 while binary + v1 stay dt=5.
    # Omitting this block is bit-identical to today.
    #
    # 2026-06-06: the 2026-06-05 "best sim" bucket tune
    # (v31_bucket_independent_tune_2026_06_05: fav0.80/eb0.005/esd0/dt2/tte8h/
    # vlb2700 → backtest $1135.72, Sharpe 26.94, maxDD $0 on n=27) was OVERFIT to
    # a zero-loss sample and is rolled back here to a prod-anchored tilt (C3).
    # Evidence (artifacts/recon/): the corpus had ZERO favorites lose at
    # settlement, so maxDD=$0 was tail-blind. A loss-injection stress (each
    # favorite loses with its implied prob 1−entry) collapsed the "best sim" to
    # ~$0 expected / 50% chance of a net loss (5th-pct −$1198). Decomposing the
    # +$723 vs prod: +$435 came from the mechanical σ/timing tilt
    # (vol_lookback 2700 / dt 2; tte 8h on the allowlist above) and only +$289
    # from the tail-for-yield knobs (fav 0.85→0.80, eb 0.02→0.005);
    # exit_safety_d was inert ($847 esd1.0 ≈ $874 esd0). So C3 = KEEP the
    # mechanical tilt, RESTORE the three risk gates to the binary baseline. C3 is
    # strictly better risk-adjusted under the stress: median +$203, P(net<0) 41%
    # (vs the overfit's 50%). dt=2 is applied PER-CLASS (bucket only) so binary +
    # v1 stay on the dt=5 feed untouched. The risk gates below MUST stay ≥ the
    # binary baseline (guarded by
    # test_bucket_override_risk_gates_not_below_binary); re-tune only at n≥50 with
    # adverse settlements in a TRUE holdout, selecting on a tail-aware metric.
    theta_overrides:
      priceBucket:
        favorite_threshold: 0.85       # C3: restored to binary (was 0.80 overfit)
        edge_buffer: 0.02              # C3: restored to binary (was 0.005 overfit)
        exit_safety_d: 1.0             # C3: restored mid-hold exit (was 0.0; inert but defensive)
        # exit_edge_threshold pinned to C3 (take-profit exit kept on); the
        # protective mid-hold exit_safety_d above is KEPT (1.0) — load-bearing on
        # the cliff-payoff bucket tail (1s sweep: buy-and-hold doubled maxDD
        # $284→$480 via two −$460 full-stake blowups). Do NOT buy-and-hold buckets.
        exit_edge_threshold: 0.0
        # 2026-06-18: move buckets to "msd2" — add the entry safety_d floor (was
        # 0.0). 1s 3-config sweep: msd2 ≈ baseline PnL ($651 vs $657) with better
        # Sharpe (6.33 vs 6.09) / lower maxDD ($273 vs $284), and on the churniest
        # markets msd2 made MORE ($103 vs $81) while cutting entries 67% — it culls
        # marginal near-boundary entries. =2 keeps it ≥ binary baseline (guardrail).
        min_safety_d: 2.0
        vol_lookback_seconds: 2700     # mechanical tilt (vs binary 900)
        vol_sampling_dt_seconds: 2     # per-class mechanical tilt; binary + v1 stay dt=5
        exit_spread_hold: 0.04         # SHR-102: hold favorite to settle when held half-spread > 0.04
                                       # (kills doom-loop churn). 35-day backtest: +$330, 0 regressions,
                                       # inert on 30/35 days. See docs/research/2026-06-12-hl-bucket-retune-exit-spread-hold.md

  # --- v3.1 theta_harvester — HL HYPE binary (2026-06-23) ---
