      stop_loss_pct: null
      tte_min_seconds: 0
      tte_max_seconds: 43200             # mirror allowlist — engine reads tte_max from defaults
      price_extreme_threshold: 0.0
      price_extreme_max: 1.0
      distance_from_strike_usd_min: 0
      vol_max: 100
      entry_cooldown_seconds: 60

    global:
