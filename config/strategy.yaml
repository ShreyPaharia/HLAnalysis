strategy:
  name: late_resolution
  paper_mode: false                     # LIVE: real HL orders

  # Pattern-based allowlist; matches QuestionMetaEvent fields.
  # Auto-applies across rollovers; blocklist for per-instance escape hatch.
  allowlist:
    # 24h regime: enter inside the last 2h, winning leg ∈ [0.90, 0.995], with
    # joint vol+distance safety gate. Calibrated on PM BTC daily Up/Down (May
    # 2025 – May 2026): full-year $560 PnL, holdout $131, Sharpe 1.76, hit 74%.
    # See sim configs/v1-safety-best.json and runs/v1-safety-best-fixed-full-2026-05-10/.
    - match:
        class: priceBinary
        underlying: BTC
      max_position_usd: 100
      stop_loss_pct: 10
      tte_min_seconds: 0
      tte_max_seconds: 7200
      price_extreme_threshold: 0.90
      price_extreme_max: 0.995
      min_safety_d: 1.5
      vol_lookback_seconds: 3600
      exit_safety_d: 1.0
      vol_ewma_lambda: 0.85
      distance_from_strike_usd_min: 0
      vol_max: 100
    # priceBucket — same per-leg consensus rule across all bucket legs.
    - match:
        class: priceBucket
        underlying: BTC
      max_position_usd: 100
      stop_loss_pct: 10
      tte_min_seconds: 0
      tte_max_seconds: 7200
      price_extreme_threshold: 0.90
      price_extreme_max: 0.995
      min_safety_d: 1.5
      vol_lookback_seconds: 3600
      exit_safety_d: 1.0
      vol_ewma_lambda: 0.85
      distance_from_strike_usd_min: 0
      vol_max: 100
    # Add more class entries as new question classes are approved for trading

  blocklist_question_idxs: []           # explicit per-instance exclusions

  defaults:
    match: {}
    max_position_usd: 100
    stop_loss_pct: 10
    tte_min_seconds: 0
    tte_max_seconds: 7200
    price_extreme_threshold: 0.90
    price_extreme_max: 0.995
    min_safety_d: 1.5
    vol_lookback_seconds: 3600
    exit_safety_d: 1.0
    vol_ewma_lambda: 0.85
    distance_from_strike_usd_min: 0
    vol_max: 100

  global:
    max_total_inventory_usd: 500
    max_concurrent_positions: 5
    daily_loss_cap_usd: 200
    max_strike_distance_pct: 50         # 50% — BTC moves 5-10% per day, allow room
    min_recent_volume_usd: 1000         # live floor — skip illiquid binaries
    stale_data_halt_seconds: 5
    reconcile_interval_seconds: 60
