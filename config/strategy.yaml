          underlying: HYPE
          venue: hyperliquid
        max_position_usd: 100             # burn-in cap (n=6) — well below BTC's $500
        stop_loss_pct: null              # theta drives exits off edge, not stop-loss
        tte_min_seconds: 0
        tte_max_seconds: 43200           # 12h — full-grid interior optimum (matches BTC binary)
        price_extreme_threshold: 0.0
        price_extreme_max: 1.0
        distance_from_strike_usd_min: 0
        vol_max: 100
        entry_cooldown_seconds: 60

    blocklist_question_idxs: []

    defaults:
