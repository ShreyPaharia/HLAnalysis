# A/B test: drift-aware safety_d. Hold all other params at v1-exit-best.
# 2 cells * 3 splits.

v1_grid:
  tte_min_seconds: [0]
  tte_max_seconds: [7200]
  price_extreme_threshold: [0.90]
  price_extreme_max: [0.995]
  distance_from_strike_usd_min: [0]
  vol_max: [100]
  stop_loss_pct: [null]
  min_safety_d: [1.5]
  vol_lookback_seconds: [3600]
  exit_safety_d: [1.0]
  exit_bid_floor: [0.0]
  drift_aware_d: [false, true]

v2_grid:
  vol_lookback_seconds: [14400]
  edge_buffer: [0.02]
  stop_loss_pct: [null]
  drift_lookback_seconds: [0]

run:
  train_markets: 60
  test_markets: 60
  step_markets: 60
  max_workers: 12
