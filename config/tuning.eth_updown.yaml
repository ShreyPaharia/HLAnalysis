# ETH up/down (binary) theta grid — seeded from the live v31_pm BTC region.
# Schema: grids.<strategy_id> + run.* (loaded by hlanalysis.backtest.tuning.load_tuning_yaml).
# Broad sweep runs on 1m klines → vol_sampling_dt_seconds fixed at 60 (the tuner
# couples reference_resample to dt per cell; dt<data granularity makes empty
# buckets). The dt=5 live-parity check is a separate winner re-run on 1s klines.
grids:
  theta_harvester:
    favorite_threshold: [0.80, 0.85, 0.90]
    edge_buffer: [0.01, 0.02, 0.03, 0.05]
    vol_lookback_seconds: [900, 1800, 3600]
    exit_safety_d: [0.0, 0.5, 1.0]
    exit_edge_threshold: [0.0]
    vol_estimator: [bipower]
    vol_sampling_dt_seconds: [60]
    tte_min_seconds: [0]
    tte_max_seconds: [86400]
    fee_model: [pm_binary]

run:
  train_markets: 60
  test_markets: 15
  step_markets: 15
  max_workers: 8
