# ETH up/down (binary) theta grid — seeded from the live v31_pm BTC region.
# Schema: grids.<strategy_id> + run.* (loaded by hlanalysis.backtest.tuning.load_tuning_yaml).
# Tuned single-stage on Binance 1s klines resampled to dt=5 (live-parity with the
# dt=5/bbo live slots) over the last 6 months (~180 daily markets, 2025-12→2026-06).
# 1m klines are still fetched for strike/settlement (PM settles on the 1m close).
grids:
  theta_harvester:
    favorite_threshold: [0.80, 0.85, 0.90]
    edge_buffer: [0.01, 0.02, 0.03, 0.05]
    vol_lookback_seconds: [900, 1800, 3600]
    exit_safety_d: [0.0, 0.5, 1.0]
    exit_edge_threshold: [0.0]
    vol_estimator: [bipower]
    vol_sampling_dt_seconds: [5]
    tte_min_seconds: [0]
    tte_max_seconds: [86400]
    fee_model: [pm_binary]

run:
  train_markets: 60
  test_markets: 15
  step_markets: 15
  max_workers: 8
