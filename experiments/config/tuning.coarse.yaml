# Coarse grid for fast initial calibration. 90-day data window → ~2-6 splits.
# v2: 2*4*2*1 = 16 cells. v1: 2*1*3*2*2*2 = 48 cells.

v1_grid:
  tte_min_seconds: [3600, 14400]
  tte_max_seconds: [86400]
  price_extreme_threshold: [0.85, 0.92, 0.97]
  distance_from_strike_usd_min: [200, 1000]
  vol_max: [0.01, 0.04]
  stop_loss_pct: [10, null]

v2_grid:
  vol_lookback_seconds: [3600, 14400]
  edge_buffer: [0.02, 0.05, 0.08, 0.12]
  stop_loss_pct: [10, null]
  drift_lookback_seconds: [0]

run:
  train_markets: 30
  test_markets: 10
  step_markets: 10
  max_workers: 8
