# PM walk-forward at tte_max=43200 (12h) — mirrors v3-1-mid-hold-walkforward.yaml
# but with a 12h cap to enable apples-to-apples comparison with HL post-σ-fix.
#
# Question: does mid-hold's PnL lift hold under a tighter cap on PM?

grids:
  v3_theta_harvester:
    vol_lookback_seconds: [3600]
    vol_sampling_dt_seconds: [60]
    vol_clip_min: [0.05]
    vol_clip_max: [5.0]
    edge_buffer: [0.02]
    fee_taker: [0.00035]
    half_spread_assumption: [0.005]
    drift_lookback_seconds: [3600]
    drift_blend: [0.0]
    favorite_threshold: [0.85]
    tte_min_seconds: [0]
    tte_max_seconds: [43200]
    edge_max: [0.20]
    min_distance_pct: [0.002]
    min_bid_notional_usd: [10.0]
    max_position_usd: [100.0]
    stop_loss_pct: [null]
    exit_edge_threshold: [0.0]
    take_profit_price: [null]
    time_stop_seconds: [0]
    gamma_lambda: [0.0]
    exit_safety_d: [0.0, 0.5, 0.75, 1.0, 1.25]

run:
  train_markets: 60
  test_markets: 60
  step_markets: 60
  max_workers: 4
