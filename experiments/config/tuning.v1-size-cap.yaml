# Targeted size cap sweep on the 1y PM BTC daily Up/Down binary corpus.
#
# Baseline = config/v1-final.json (the live v1 binary params: thr=0.85, max=0.97,
# stop=null, exit=1.0, λ=0.85). Walk-forward 5-OOS-split total $577 on that
# baseline; we need ≥$30 improvement to ship the cap.
#
# The cap multiplies size by (1 - size_cap_near_strike_pct) when BOTH:
#   - chosen leg ask < size_cap_min_ask
#   - |BTC - boundary| / boundary < size_cap_max_dist_pct%
# (Boundary = strike for binaries; nearest of lo/hi for buckets.)
#
# Grid (45 cells):
#   size_cap_near_strike_pct  [0, 0.3, 0.5, 0.7, 1.0]   5  <-- 0 = baseline
#   size_cap_max_dist_pct     [1.0, 1.5, 2.0]           3
#   size_cap_min_ask          [0.85, 0.88, 0.92]        3
# Splits: 60/60/60 → ~5 OOS windows over ~366 binary markets, same as
# config/tuning.v1-1year.yaml.

grids:
  v1_late_resolution:
    tte_min_seconds: [0]
    tte_max_seconds: [7200]
    price_extreme_threshold: [0.85]
    price_extreme_max: [0.97]
    distance_from_strike_usd_min: [0]
    vol_max: [100]
    stop_loss_pct: [null]
    min_safety_d: [1.0]
    vol_lookback_seconds: [3600]
    exit_safety_d: [1.0]
    exit_bid_floor: [0]
    drift_aware_d: [false]
    vol_ewma_lambda: [0.85]
    max_position_usd: [100]
    size_cap_near_strike_pct: [0.0, 0.3, 0.5, 0.7, 1.0]
    size_cap_max_dist_pct: [1.0, 1.5, 2.0]
    size_cap_min_ask: [0.85, 0.88, 0.92]

run:
  train_markets: 60
  test_markets: 60
  step_markets: 60
  max_workers: 12
